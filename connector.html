<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TimeTrack – Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
// ─────────────────────────────────────────────────────────────
// TimeTrack Power-Up – Connector
//
// STORAGE:
//   board/shared/tt-permissions → { admins:[id], trackers:[id] }
//   board/shared/tt-logs        → [{ id, memberId, memberName,
//                                    cardId, cardName, cardLabels,
//                                    mins, desc, date }]
//   card/shared/tt-total        → number (minuty, cache pro badge)
//   member/private/tt-running-{cardId} → { startedAt } | null
// ─────────────────────────────────────────────────────────────

const ICON_TIMER='https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/timer.svg';
const ICON_CLOCK='https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/clock.svg';
const ICON_CHART='https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/bar-chart-2.svg';

async function getPerms(t){return(await t.get('board','shared','tt-permissions'))||{admins:[],trackers:[]};}
async function getMemberId(t){return(await t.member('id')).id;}
async function isAdmin(t){const[p,id]=await Promise.all([getPerms(t),getMemberId(t)]);if(p.admins.length===0)return true;return p.admins.includes(id);}
async function canTrack(t){const[p,id]=await Promise.all([getPerms(t),getMemberId(t)]);if(p.admins.includes(id))return true;return p.trackers.includes(id);}
async function getLogs(t){return(await t.get('board','shared','tt-logs'))||[];}

function fmtHM(m){const h=Math.floor(m/60),mm=m%60;return h>0?h+'h '+mm+'m':mm+'m';}
function fmtRunning(startedAt){const s=Math.floor((Date.now()-startedAt)/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+':'+String(m).padStart(2,'0')+' běží':m+'m běží';}

TrelloPowerUp.initialize({

  // ── card-badges (board view, neklikací) ──────────────────
  'card-badges':async(t)=>{
    if(!await canTrack(t))return[];
    const card=await t.card('id');
    const logs=await getLogs(t);
    const tot=logs.filter(l=>l.cardId===card.id).reduce((s,l)=>s+l.mins,0);
    if(!tot)return[];
    return[{icon:ICON_CLOCK,text:fmtHM(tot),color:'purple'}];
  },

  // ── card-detail-badges (detail karty, klikací → modal) ───
  'card-detail-badges':async(t)=>{
    if(!await canTrack(t))return[];
    const[card,memberId,admin]=await Promise.all([t.card('id'),getMemberId(t),isAdmin(t)]);
    const[logs,running]=await Promise.all([getLogs(t),t.get('member','private','tt-running-'+card.id)]);
    const cardLogs=logs.filter(l=>l.cardId===card.id);
    const myMins=cardLogs.filter(l=>l.memberId===memberId).reduce((s,l)=>s+l.mins,0);
    const allMins=cardLogs.reduce((s,l)=>s+l.mins,0);
    const isRunning=!!(running?.startedAt);

    // Modal = průhledné pozadí s floating oknem, klik mimo NIC nedělá
    const open=(t)=>t.modal({title:' ',url:'./tracker-popup.html',fullscreen:true});
    const badges=[];

    if(isRunning){
      badges.push({title:'Časovač běží – klikni pro detail',text:'● '+fmtRunning(running.startedAt),color:'green',icon:ICON_TIMER,callback:open,refresh:30});
    }else if(admin){
      badges.push({title:allMins>0?'Celkový čas týmu':'Spustit sledování',text:allMins>0?'▶ '+fmtHM(allMins):'▶ Spustit',color:allMins>0?'purple':null,icon:ICON_TIMER,callback:open});
    }else{
      badges.push({title:myMins>0?'Můj čas':'Spustit sledování',text:myMins>0?'▶ '+fmtHM(myMins):'▶ Spustit',color:myMins>0?'green':null,icon:ICON_TIMER,callback:open});
    }
    if(admin&&myMins>0&&allMins!==myMins){
      badges.push({title:'Můj čas na kartě',text:'👤 '+fmtHM(myMins),color:'green',icon:ICON_CLOCK,callback:open});
    }
    return badges;
  },

  // ── board-buttons (Time Report, jen admini) ───────────────
  'board-buttons':async(t)=>{
    if(!await isAdmin(t))return[];
    return[{icon:ICON_CHART,text:'Time Report',callback:(t)=>t.modal({title:'TimeTrack – Report',url:'./report.html',fullscreen:true})}];
  },

  // ── show-settings ─────────────────────────────────────────
  'show-settings':async(t)=>{
    if(!await isAdmin(t))return t.popup({title:'Přístup odepřen',url:'./no-access.html',height:100});
    return t.popup({title:'TimeTrack – Nastavení',url:'./settings.html',height:560});
  },

},{
  appKey:'e4d8502325aff04bbe003d7c3eea4acf',
  appName:'TimeTrack',
});
</script>
</body>
</html>
