<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PrimeTime – Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
const ICON_TIMER   = 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/timer.svg';
const ICON_CLOCK   = 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/clock.svg';
const ICON_CHART   = 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/bar-chart-2.svg';
const ICON_COMMENT = 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/message-square-clock.svg';

async function getPerms(t){return(await t.get('board','shared','tt-permissions'))||{admins:[],trackers:[]};}
async function getMid(t){return(await t.member('id')).id;}
async function isAdmin(t){const[p,id]=await Promise.all([getPerms(t),getMid(t)]);return p.admins.length===0||p.admins.includes(id);}
async function canTrack(t){const[p,id]=await Promise.all([getPerms(t),getMid(t)]);if(p.admins.includes(id))return true;return p.trackers.includes(id);}
async function getLogs(t){return(await t.get('board','shared','tt-logs'))||[];}
function fmtHM(m){const h=Math.floor(m/60),mm=m%60;return h>0?h+'h '+mm+'m':mm+'m';}
function fmtRun(startedAt){const s=Math.floor((Date.now()-startedAt)/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+':'+String(m).padStart(2,'0')+' běží':m+'m běží';}

TrelloPowerUp.initialize({

  'card-badges':async(t)=>{
    if(!await canTrack(t))return[];
    const card=await t.card('id');
    const tot=(await getLogs(t)).filter(l=>l.cardId===card.id).reduce((s,l)=>s+l.mins,0);
    if(!tot)return[];
    return[{icon:ICON_CLOCK,text:fmtHM(tot),color:'purple'}];
  },

  'card-detail-badges':async(t)=>{
    if(!await canTrack(t))return[];
    const[card,mid,admin]=await Promise.all([t.card('id'),getMid(t),isAdmin(t)]);
    const[logs,running]=await Promise.all([getLogs(t),t.get('member','private','tt-running-'+card.id)]);
    const cl=logs.filter(l=>l.cardId===card.id);
    const myM=cl.filter(l=>l.memberId===mid).reduce((s,l)=>s+l.mins,0);
    const allM=cl.reduce((s,l)=>s+l.mins,0);
    const isRun=!!(running?.startedAt);
    const open=(t)=>t.popup({title:'PrimeTime',url:'./tracker-popup.html',height:600});
    const badges=[];
    if(isRun){
      badges.push({title:'Časovač běží – klikni',text:'● '+fmtRun(running.startedAt),color:'green',icon:ICON_TIMER,callback:open,refresh:30});
    }else if(admin){
      badges.push({title:allM>0?'Celkový čas týmu':'Spustit sledování',text:allM>0?'▶ '+fmtHM(allM):'▶ Spustit',color:allM>0?'purple':null,icon:ICON_TIMER,callback:open});
    }else{
      badges.push({title:myM>0?'Můj čas':'Spustit sledování',text:myM>0?'▶ '+fmtHM(myM):'▶ Spustit',color:myM>0?'green':null,icon:ICON_TIMER,callback:open});
    }
    if(admin&&myM>0&&allM!==myM){
      badges.push({title:'Můj čas',text:'👤 '+fmtHM(myM),color:'green',icon:ICON_CLOCK,callback:open});
    }
    return badges;
  },

  // Tlačítko "Naplánovat komentář" v postranní liště karty
  // Zobrazí se všem členům — autorizace probíhá až uvnitř popupu
  'card-buttons':async(t)=>{
    // Zjistíme počet čekajících jobů pro badge na tlačítku
    const jobs=await t.get('member','private','pt-jobs')||[];
    const card=await t.card('id');
    const pending=jobs.filter(j=>j.cardId===card.id&&new Date(j.sendAt)>new Date());
    return[{
      icon:  ICON_COMMENT,
      text:  pending.length>0?`Naplánovat komentář (${pending.length})`:'Naplánovat komentář',
      callback:(t)=>t.popup({
        title:  'PrimeTime – Naplánovat komentář',
        url:    './schedule-popup.html',
        height: 520,
      }),
    }];
  },

  'board-buttons':async(t)=>{
    if(!await isAdmin(t))return[];
    return[{icon:ICON_CHART,text:'Time Report',callback:(t)=>t.modal({title:'PrimeTime – Report',url:'./report.html',fullscreen:true})}];
  },

  'show-settings':async(t)=>{
    if(!await isAdmin(t))return t.popup({title:'Přístup odepřen',url:'./no-access.html',height:100});
    return t.popup({title:'PrimeTime – Nastavení',url:'./settings.html',height:560});
  },

},{
  appKey:'e4d8502325aff04bbe003d7c3eea4acf',
  appName:'PrimeTime',
});
</script>
</body>
</html>
