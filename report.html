<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>TimeTrack – Report</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&family=Inter:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D0F; --surface: #16161A; --surface2: #1E1E24; --surface3: #26262E;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #F0EFE8; --muted: #7A7A88;
    --accent: #6C5CE7; --accent2: #A29BFE;
    --green: #00B894; --font-heading: 'Syne', sans-serif;
    --font-body: 'Inter', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 52px;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-family: var(--font-heading); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 24px; height: 24px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .logo span { color: var(--accent2); }

  .filters { display: flex; gap: 6px; }
  .filter-btn {
    padding: 5px 14px; border-radius: 7px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--muted); font-size: 12px;
    font-family: var(--font-body); cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .filter-btn:hover:not(.active) { background: var(--surface3); color: var(--text); }

  .export-btn {
    padding: 5px 14px; border-radius: 7px; border: 1px solid var(--border2);
    background: transparent; color: var(--muted); font-size: 12px;
    font-family: var(--font-body); cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .export-btn:hover { background: var(--surface2); color: var(--text); }

  .main { padding: 1.5rem 2rem; max-width: 1100px; margin: 0 auto; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
  }
  .stat.accent { background: rgba(108,92,231,0.08); border-color: rgba(108,92,231,0.2); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
  .stat-value { font-family: var(--font-mono); font-size: 26px; font-weight: 500; margin: 6px 0 2px; }
  .stat.accent .stat-value { color: var(--accent2); }
  .stat-sub { font-size: 11px; color: var(--muted); }

  /* TABS */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
  .tab {
    padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; background: transparent; color: var(--muted);
    font-family: var(--font-body); border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: all 0.15s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* TABLE */
  .tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 1.25rem; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  td { padding: 11px 1.25rem; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .tdm { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: white; flex-shrink: 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .time-mono { font-family: var(--font-mono); font-size: 13px; color: var(--accent2); font-weight: 500; }
  .muted { color: var(--muted); font-size: 12px; }

  /* BARS */
  .bar-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
  .bar-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .bar-title { font-family: var(--font-heading); font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
  .bar-item { margin-bottom: 10px; }
  .bar-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .bar-name { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .bar-time { font-family: var(--font-mono); font-size: 11px; color: var(--accent2); }
  .bar-bg { height: 5px; background: var(--surface3); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s ease; }

  .progress-bar { height: 3px; background: var(--surface3); border-radius: 3px; overflow: hidden; width: 72px; flex-shrink: 0; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--accent); }

  .loading { padding: 3rem; text-align: center; color: var(--muted); font-size: 14px; }
  .empty { padding: 2rem; text-align: center; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⏱</div>
    Time<span>Track</span> <span style="font-size:12px;color:var(--muted);font-family:var(--font-body);font-weight:400;margin-left:4px">Report</span>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('week',this)">Tento týden</button>
    <button class="filter-btn" onclick="setFilter('month',this)">Tento měsíc</button>
    <button class="filter-btn" onclick="setFilter('all',this)">Vše</button>
  </div>
  <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<div class="main">
  <div id="loading" class="loading">Načítám data…</div>
  <div id="content" style="display:none">

    <div class="stats-grid">
      <div class="stat accent"><div class="stat-label">Celkový čas</div><div class="stat-value" id="s-total">—</div><div class="stat-sub" id="s-period">—</div></div>
      <div class="stat"><div class="stat-label">Záznamy</div><div class="stat-value" id="s-entries">—</div><div class="stat-sub">celkem</div></div>
      <div class="stat"><div class="stat-label">Aktivní členové</div><div class="stat-value" id="s-members">—</div><div class="stat-sub">přispívají</div></div>
      <div class="stat"><div class="stat-label">Nejaktivnější</div><div class="stat-value" id="s-top" style="font-size:18px;margin-top:8px">—</div><div class="stat-sub" id="s-top-time">—</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setTab('members',this)">Podle členů</button>
      <button class="tab" onclick="setTab('cards',this)">Podle karet</button>
      <button class="tab" onclick="setTab('log',this)">Detailní log</button>
    </div>

    <!-- MEMBERS TAB -->
    <div id="tab-members">
      <div class="bar-wrap">
        <div class="bar-card"><div class="bar-title">Čas podle členů</div><div id="member-bars"></div></div>
        <div class="bar-card"><div class="bar-title">Čas podle karet</div><div id="card-bars"></div></div>
      </div>
      <div class="tbl-wrap">
        <table><thead><tr><th>Člen</th><th>Záznamy</th><th>Celkem</th><th>Podíl</th></tr></thead>
        <tbody id="tb-members"></tbody></table>
      </div>
    </div>

    <!-- CARDS TAB -->
    <div id="tab-cards" style="display:none">
      <div class="tbl-wrap">
        <table><thead><tr><th>Karta</th><th>Seznam</th><th>Pracovali</th><th>Celkem</th><th>Průběh</th></tr></thead>
        <tbody id="tb-cards"></tbody></table>
      </div>
    </div>

    <!-- LOG TAB -->
    <div id="tab-log" style="display:none">
      <div class="tbl-wrap">
        <table><thead><tr><th>Člen</th><th>Karta</th><th>Popis</th><th>Čas</th><th>Datum</th></tr></thead>
        <tbody id="tb-log"></tbody></table>
      </div>
    </div>

  </div>
</div>

<script>
const t = TrelloPowerUp.iframe();

const COLORS = ['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function memberColor(id) {
  let h = 0; for (let c of id) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(name) {
  const p = (name || '?').trim().split(' ');
  return (p[0][0] + (p[1]?.[0] || '')).toUpperCase();
}
function fmtHM(mins) {
  const h = Math.floor(mins/60), m = mins%60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

let allLogs = [];
let allCards = [];
let currentFilter = 'week';

function filterLogs(logs) {
  if (currentFilter === 'all') return logs;
  const now = new Date();
  return logs.filter(l => {
    const d = new Date(l.date);
    if (currentFilter === 'week') {
      const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
      return d >= weekAgo;
    } else {
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }
  });
}

async function init() {
  const [logsRaw, board] = await Promise.all([
    t.get('board', 'shared', 'tt-logs'),
    t.board('cards'),
  ]);

  allLogs = logsRaw || [];
  allCards = board.cards || [];

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  render();
}

function render() {
  const logs = filterLogs(allLogs);

  // Stats
  const totalMins = logs.reduce((s, l) => s + l.mins, 0);
  document.getElementById('s-total').textContent = fmtHM(totalMins);
  document.getElementById('s-entries').textContent = logs.length;
  document.getElementById('s-period').textContent = currentFilter === 'week' ? 'tento týden' : currentFilter === 'month' ? 'tento měsíc' : 'celkem';

  const memberIds = [...new Set(logs.map(l => l.memberId))];
  document.getElementById('s-members').textContent = memberIds.length;

  const memberMins = {};
  const memberNames = {};
  logs.forEach(l => {
    memberMins[l.memberId] = (memberMins[l.memberId] || 0) + l.mins;
    memberNames[l.memberId] = l.memberName;
  });

  const topEntry = Object.entries(memberMins).sort((a,b) => b[1]-a[1])[0];
  if (topEntry) {
    const name = memberNames[topEntry[0]] || '?';
    const short = name.split(' ').map((p,i) => i===0 ? p : p[0]+'.').join(' ');
    document.getElementById('s-top').textContent = short;
    document.getElementById('s-top-time').textContent = fmtHM(topEntry[1]);
  }

  // Member bars
  const maxMemberMins = Math.max(...Object.values(memberMins), 1);
  document.getElementById('member-bars').innerHTML = Object.entries(memberMins)
    .sort((a,b) => b[1]-a[1])
    .map(([id, mins]) => {
      const pct = Math.round((mins / maxMemberMins) * 100);
      const color = memberColor(id);
      return `
        <div class="bar-item">
          <div class="bar-row">
            <div class="bar-name">
              <div class="avatar" style="background:${color};width:18px;height:18px;font-size:8px">${initials(memberNames[id])}</div>
              ${memberNames[id] || id}
            </div>
            <div class="bar-time">${fmtHM(mins)}</div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
      `;
    }).join('') || '<div class="empty">Žádná data</div>';

  // Card bars
  const cardMins = {};
  const cardNames = {};
  const cardColors = {};
  logs.forEach(l => {
    cardMins[l.cardId] = (cardMins[l.cardId] || 0) + l.mins;
    const card = allCards.find(c => c.id === l.cardId);
    cardNames[l.cardId] = card?.name || l.cardId;
    cardColors[l.cardId] = '#6C5CE7';
  });

  const maxCardMins = Math.max(...Object.values(cardMins), 1);
  document.getElementById('card-bars').innerHTML = Object.entries(cardMins)
    .sort((a,b) => b[1]-a[1]).slice(0,8)
    .map(([id, mins]) => {
      const pct = Math.round((mins / maxCardMins) * 100);
      return `
        <div class="bar-item">
          <div class="bar-row">
            <div class="bar-name" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cardNames[id]}</div>
            <div class="bar-time">${fmtHM(mins)}</div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
        </div>
      `;
    }).join('') || '<div class="empty">Žádná data</div>';

  // Members table
  document.getElementById('tb-members').innerHTML = Object.entries(memberMins)
    .sort((a,b) => b[1]-a[1])
    .map(([id, mins]) => {
      const entries = logs.filter(l => l.memberId === id).length;
      const pct = totalMins > 0 ? Math.round((mins / totalMins) * 100) : 0;
      const color = memberColor(id);
      return `
        <tr>
          <td><div class="tdm">
            <div class="avatar" style="background:${color}">${initials(memberNames[id])}</div>
            <span style="font-weight:500">${memberNames[id] || id}</span>
          </div></td>
          <td class="muted">${entries}</td>
          <td class="time-mono">${fmtHM(mins)}</td>
          <td><div style="display:flex;align-items:center;gap:8px">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="muted">${pct}%</span>
          </div></td>
        </tr>
      `;
    }).join('') || '<tr><td colspan="4" class="empty">Žádná data</td></tr>';

  // Cards table
  document.getElementById('tb-cards').innerHTML = Object.entries(cardMins)
    .sort((a,b) => b[1]-a[1])
    .map(([id, mins]) => {
      const workers = [...new Set(logs.filter(l => l.cardId === id).map(l => l.memberId))];
      const pct = Math.round((mins / maxCardMins) * 100);
      const card = allCards.find(c => c.id === id);
      const avatars = workers.map(mid => {
        const color = memberColor(mid);
        return `<div class="avatar" style="background:${color};width:20px;height:20px;font-size:8px;margin-right:-4px">${initials(memberNames[mid])}</div>`;
      }).join('');
      return `
        <tr>
          <td><div class="tdm"><div class="dot" style="background:var(--accent)"></div><span style="font-weight:500">${cardNames[id]}</span></div></td>
          <td class="muted">${card?.list?.name || '—'}</td>
          <td><div style="display:flex">${avatars}</div></td>
          <td class="time-mono">${fmtHM(mins)}</td>
          <td><div class="progress-bar" style="width:80px"><div class="progress-fill" style="width:${pct}%"></div></div></td>
        </tr>
      `;
    }).join('') || '<tr><td colspan="5" class="empty">Žádná data</td></tr>';

  // Log table
  document.getElementById('tb-log').innerHTML = [...logs].reverse().map(l => {
    const card = allCards.find(c => c.id === l.cardId);
    const color = memberColor(l.memberId);
    return `
      <tr>
        <td><div class="tdm">
          <div class="avatar" style="background:${color}">${initials(l.memberName)}</div>
          <span>${l.memberName}</span>
        </div></td>
        <td class="muted" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${card?.name || l.cardId}</td>
        <td class="muted">${l.desc || '—'}</td>
        <td class="time-mono">${fmtHM(l.mins)}</td>
        <td class="muted">${l.date}</td>
      </tr>
    `;
  }).join('') || '<tr><td colspan="5" class="empty">Žádné záznamy</td></tr>';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['members','cards','log'].forEach(name => {
    document.getElementById(`tab-${name}`).style.display = name === tab ? 'block' : 'none';
  });
}

// CSV export
function exportCSV() {
  const logs = filterLogs(allLogs);
  const rows = [['Člen','Karta','Popis','Minuty','Datum']];
  logs.forEach(l => {
    const card = allCards.find(c => c.id === l.cardId);
    rows.push([l.memberName, card?.name || l.cardId, l.desc || '', l.mins, l.date]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `timetrack-report-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

init();
</script>
</body>
</html>
