<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>TimeTrack – Report</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&family=Inter:wght@400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0D0D0F;--surface:#16161A;--s2:#1E1E24;--s3:#26262E;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#F0EFE8;--muted:#7A7A88;--accent:#6C5CE7;--accent2:#A29BFE;
    --fb:'Inter',sans-serif;--fh:'Syne',sans-serif;--fm:'DM Mono',monospace;
  }
  html,body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20;}
  .logo{font-family:var(--fh);font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .logo-icon{width:24px;height:24px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .logo span{color:var(--accent2);}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .filter-btn{padding:5px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--s2);color:var(--muted);font-size:12px;font-family:var(--fb);cursor:pointer;transition:all 0.15s;font-weight:500;}
  .filter-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
  .filter-btn:hover:not(.active){background:var(--s3);color:var(--text);}
  .export-btn{padding:5px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;font-family:var(--fb);cursor:pointer;transition:all 0.15s;}
  .export-btn:hover{background:var(--s2);color:var(--text);}
  .main{padding:1.5rem 2rem;max-width:1100px;margin:0 auto;}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;}
  .stat.accent{background:rgba(108,92,231,0.08);border-color:rgba(108,92,231,0.2);}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;}
  .stat-value{font-family:var(--fm);font-size:26px;font-weight:500;margin:6px 0 2px;}
  .stat.accent .stat-value{color:var(--accent2);}
  .stat-sub{font-size:11px;color:var(--muted);}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
  .tab{padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--fb);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}
  .tab:hover:not(.active){color:var(--text);}
  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:10px 1.25rem;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;border-bottom:1px solid var(--border);background:var(--s2);}
  th.sortable{cursor:pointer;user-select:none;}
  th.sortable:hover{color:var(--text);}
  td{padding:10px 1.25rem;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--s2);}
  .tdm{display:flex;align-items:center;gap:8px;}
  .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:white;flex-shrink:0;}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .time-mono{font-family:var(--fm);font-size:13px;color:var(--accent2);font-weight:500;}
  .muted-cell{color:var(--muted);font-size:12px;}
  .progress-bar{height:3px;background:var(--s3);border-radius:3px;overflow:hidden;width:72px;flex-shrink:0;}
  .progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.4s;}
  .labels-cell{display:flex;flex-wrap:wrap;gap:4px;}
  .label-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;color:white;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
  .bar-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
  .bar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
  .bar-title{font-family:var(--fh);font-size:14px;font-weight:600;margin-bottom:1rem;}
  .bar-item{margin-bottom:10px;}
  .bar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .bar-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-time{font-family:var(--fm);font-size:11px;color:var(--accent2);}
  .bar-bg{height:5px;background:var(--s3);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;transition:width 0.5s ease;}
  .log-filters{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:end;padding:14px 1.25rem;background:var(--s2);border-bottom:1px solid var(--border);}
  .lf-group{display:flex;flex-direction:column;gap:4px;}
  .lf-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:500;}
  .lf-input{font-family:var(--fb);font-size:12px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);outline:none;width:100%;}
  .lf-input:focus{border-color:var(--accent);}
  .lf-input::placeholder{color:var(--muted);}
  select.lf-input{cursor:pointer;}
  .lf-date-row{display:flex;gap:5px;align-items:center;}
  .lf-date{font-family:var(--fb);font-size:12px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:7px 6px;color:var(--text);outline:none;width:100%;}
  .lf-date:focus{border-color:var(--accent);}
  .lf-date-sep{color:var(--muted);font-size:11px;flex-shrink:0;}
  .btn-clear{padding:8px 12px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;font-family:var(--fb);cursor:pointer;transition:all 0.15s;white-space:nowrap;align-self:flex-end;}
  .btn-clear:hover{background:var(--s3);color:var(--text);}
  .active-tags{display:flex;flex-wrap:wrap;gap:6px;padding:8px 1.25rem;background:var(--s2);border-bottom:1px solid var(--border);}
  .active-tags:empty{display:none;}
  .atag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:rgba(108,92,231,0.15);color:var(--accent2);border:1px solid rgba(108,92,231,0.25);cursor:pointer;transition:background 0.15s;}
  .atag:hover{background:rgba(108,92,231,0.28);}
  .result-count{padding:6px 1.25rem;font-size:11px;color:var(--muted);background:var(--s2);border-bottom:1px solid var(--border);}
  .page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
  .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--muted);}
  .empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px;}
  .error-box{background:rgba(214,48,49,0.08);border:1px solid rgba(214,48,49,0.2);border-radius:10px;padding:1rem 1.25rem;color:#FF7675;font-size:13px;margin-bottom:1rem;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-icon">⏱</div>Time<span>Track</span><span style="font-size:12px;color:var(--muted);font-family:var(--fb);font-weight:400;margin-left:4px">Report</span></div>
  <div class="topbar-right">
    <button class="filter-btn active" onclick="setPeriod('week',this)">Tento týden</button>
    <button class="filter-btn" onclick="setPeriod('month',this)">Tento měsíc</button>
    <button class="filter-btn" onclick="setPeriod('all',this)">Vše</button>
    <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
  </div>
</div>
<div class="main">
  <div id="page-loading" class="page-loading"><div class="spinner"></div><div class="loading-text">Načítám záznamy…</div></div>
  <div id="content" style="display:none">
    <div id="error-box" class="error-box" style="display:none"></div>
    <div class="stats-grid">
      <div class="stat accent"><div class="stat-label">Celkový čas</div><div class="stat-value" id="s-total">—</div><div class="stat-sub" id="s-period">—</div></div>
      <div class="stat"><div class="stat-label">Záznamy</div><div class="stat-value" id="s-entries">—</div><div class="stat-sub">celkem</div></div>
      <div class="stat"><div class="stat-label">Aktivní členové</div><div class="stat-value" id="s-members">—</div><div class="stat-sub">přispívají</div></div>
      <div class="stat"><div class="stat-label">Nejaktivnější</div><div class="stat-value" id="s-top" style="font-size:18px;margin-top:8px">—</div><div class="stat-sub" id="s-top-time">—</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('members',this)">Podle členů</button>
      <button class="tab" onclick="setTab('cards',this)">Podle karet</button>
      <button class="tab" onclick="setTab('log',this)">Detailní log</button>
    </div>
    <div id="tab-members">
      <div class="bar-wrap">
        <div class="bar-card"><div class="bar-title">Čas podle členů</div><div id="member-bars"></div></div>
        <div class="bar-card"><div class="bar-title">Top karty</div><div id="card-bars"></div></div>
      </div>
      <div class="tbl-wrap"><table><thead><tr><th>Člen</th><th>Záznamy</th><th>Celkem</th><th>Podíl</th></tr></thead><tbody id="tb-members"></tbody></table></div>
    </div>
    <div id="tab-cards" style="display:none">
      <div class="tbl-wrap"><table><thead><tr><th>Karta</th><th>Štítky</th><th>Pracovali</th><th>Celkem</th><th>Průběh</th></tr></thead><tbody id="tb-cards"></tbody></table></div>
    </div>
    <div id="tab-log" style="display:none">
      <div class="tbl-wrap">
        <div class="log-filters">
          <div class="lf-group"><span class="lf-label">Člen</span><select class="lf-input" id="f-member" onchange="applyFilters()"><option value="">Všichni</option></select></div>
          <div class="lf-group"><span class="lf-label">Karta</span><select class="lf-input" id="f-card" onchange="applyFilters()"><option value="">Všechny</option></select></div>
          <div class="lf-group"><span class="lf-label">Štítek</span><select class="lf-input" id="f-label" onchange="applyFilters()"><option value="">Všechny štítky</option></select></div>
          <div class="lf-group"><span class="lf-label">Datum</span><div class="lf-date-row"><input type="date" class="lf-date" id="f-from" onchange="applyFilters()" title="Od"><span class="lf-date-sep">–</span><input type="date" class="lf-date" id="f-to" onchange="applyFilters()" title="Do"></div></div>
          <button class="btn-clear" onclick="clearFilters()">✕ Smazat</button>
        </div>
        <div style="padding:8px 1.25rem;background:var(--s2);border-bottom:1px solid var(--border);">
          <input type="text" class="lf-input" id="f-desc" placeholder="Hledat v popisu…" oninput="applyFilters()" style="max-width:340px;">
        </div>
        <div class="active-tags" id="active-tags"></div>
        <div class="result-count" id="result-count"></div>
        <table><thead><tr>
          <th class="sortable" onclick="sortBy('memberName')">Člen <span id="si-memberName"></span></th>
          <th class="sortable" onclick="sortBy('cardName')">Karta <span id="si-cardName"></span></th>
          <th>Štítky</th><th>Popis</th>
          <th class="sortable" onclick="sortBy('mins')">Čas <span id="si-mins"></span></th>
          <th class="sortable" onclick="sortBy('date')">Datum <span id="si-date"></span></th>
        </tr></thead><tbody id="tb-log"></tbody></table>
      </div>
    </div>
  </div>
</div>
<script>
const LABEL_HEX={green:'#61BD4F',yellow:'#F2D600',orange:'#FF9F1A',red:'#EB5A46',purple:'#C377E0',blue:'#0079BF',sky:'#00C2E0',lime:'#51E898',pink:'#FF78CB',black:'#344563',green_dark:'#519839',yellow_dark:'#D9B51C',orange_dark:'#D79B00',red_dark:'#B04632',purple_dark:'#89609E',blue_dark:'#055A8C',sky_dark:'#0098C7',lime_dark:'#4BBF6B',pink_dark:'#C9558F',black_dark:'#091E42',green_light:'#B7DDB0',yellow_light:'#F5EA92',orange_light:'#FAD29C',red_light:'#EFB3AB',purple_light:'#DFC0EB',blue_light:'#9AD0ED',sky_light:'#76D6ED',lime_light:'#B3F1D0',pink_light:'#F9C2E4',black_light:'#B6BFCE'};
function lhex(c){return LABEL_HEX[c]||'#888';}
function renderLabels(labels){if(!labels||!labels.length)return'<span style="color:var(--muted);font-size:12px">—</span>';return'<div class="labels-cell">'+labels.map(l=>'<span class="label-pill" style="background:'+lhex(l.color)+'">'+( l.name||'&nbsp;&nbsp;')+'</span>').join('')+'</div>';}
const IN_TRELLO=(()=>{try{return window.self!==window.top&&typeof TrelloPowerUp!=='undefined';}catch(e){return false;}})();
const MOCK_LOGS=[
  {id:'l1',memberId:'m1',memberName:'Jakub Novák',cardId:'c1',cardName:'Redesign homepage',cardLabels:[{name:'Design',color:'purple'},{name:'Q2',color:'green'}],mins:90,desc:'Wireframy navigace',date:'2026-03-24'},
  {id:'l2',memberId:'m1',memberName:'Jakub Novák',cardId:'c1',cardName:'Redesign homepage',cardLabels:[{name:'Design',color:'purple'},{name:'Q2',color:'green'}],mins:135,desc:'Hero sekce',date:'2026-03-24'},
  {id:'l3',memberId:'m2',memberName:'Tereza Dvořák',cardId:'c2',cardName:'API integrace Stripe',cardLabels:[{name:'Backend',color:'blue'},{name:'Urgent',color:'red'}],mins:180,desc:'OAuth flow',date:'2026-03-25'},
  {id:'l4',memberId:'m3',memberName:'Marek Svoboda',cardId:'c3',cardName:'Bug #342 login',cardLabels:[{name:'Bug',color:'red'}],mins:75,desc:'Debug session token',date:'2026-03-25'},
  {id:'l5',memberId:'m1',memberName:'Jakub Novák',cardId:'c4',cardName:'CI/CD pipeline',cardLabels:[{name:'DevOps',color:'sky'}],mins:60,desc:'Docker konfigurace',date:'2026-03-26'},
  {id:'l6',memberId:'m2',memberName:'Tereza Dvořák',cardId:'c1',cardName:'Redesign homepage',cardLabels:[{name:'Design',color:'purple'},{name:'Q2',color:'green'}],mins:150,desc:'Mobile breakpoints',date:'2026-03-26'},
  {id:'l7',memberId:'m3',memberName:'Marek Svoboda',cardId:'c2',cardName:'API integrace Stripe',cardLabels:[{name:'Backend',color:'blue'},{name:'Urgent',color:'red'}],mins:90,desc:'Webhook testing',date:'2026-03-27'},
  {id:'l8',memberId:'m4',memberName:'Lucie Krejčí',cardId:'c5',cardName:'Teambuilding',cardLabels:[{name:'Marketing',color:'orange'}],mins:120,desc:'Booking ubytování',date:'2026-03-27'},
  {id:'l9',memberId:'m1',memberName:'Jakub Novák',cardId:'c5',cardName:'Teambuilding',cardLabels:[{name:'Marketing',color:'orange'}],mins:45,desc:'Email koordinace',date:'2026-03-28'},
];
let _t=null;if(IN_TRELLO)_t=TrelloPowerUp.iframe();
async function fetchLogs(){if(!IN_TRELLO)return MOCK_LOGS;return(await _t.get('board','shared','tt-logs'))||[];}
const COLORS=['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function mcolor(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function inits(n){const p=(n||'?').trim().split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}
function fmtHM(m){const h=Math.floor(m/60),mm=m%60;return h>0?h+'h '+mm+'m':mm+'m';}
let allLogs=[],cardNames={},currentPeriod='week';
let lf={member:'',card:'',label:'',desc:'',from:'',to:''};
let ls={key:'date',dir:'desc'};
function byPeriod(logs){if(currentPeriod==='all')return logs;const now=new Date();return logs.filter(l=>{const d=new Date(l.date);if(currentPeriod==='week'){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});}
async function init(){try{allLogs=await fetchLogs();allLogs.forEach(l=>{if(l.cardName)cardNames[l.cardId]=l.cardName;});document.getElementById('page-loading').style.display='none';document.getElementById('content').style.display='block';renderAll();}catch(err){document.getElementById('page-loading').style.display='none';document.getElementById('content').style.display='block';const eb=document.getElementById('error-box');eb.style.display='block';eb.textContent='Chyba: '+err.message;}}
function renderAll(){const logs=byPeriod(allLogs);renderStats(logs);renderMembersTab(logs);renderCardsTab(logs);populateDropdowns(logs);renderLogTab();}
function renderStats(logs){const tot=logs.reduce((s,l)=>s+l.mins,0);document.getElementById('s-total').textContent=fmtHM(tot);document.getElementById('s-entries').textContent=logs.length;document.getElementById('s-period').textContent=currentPeriod==='week'?'tento týden':currentPeriod==='month'?'tento měsíc':'celkem';document.getElementById('s-members').textContent=[...new Set(logs.map(l=>l.memberId))].length;const mm={},mn={};logs.forEach(l=>{mm[l.memberId]=(mm[l.memberId]||0)+l.mins;mn[l.memberId]=l.memberName;});const top=Object.entries(mm).sort((a,b)=>b[1]-a[1])[0];if(top){const n=mn[top[0]]||'?';document.getElementById('s-top').textContent=n.split(' ').map((p,i)=>i===0?p:p[0]+'.').join(' ');document.getElementById('s-top-time').textContent=fmtHM(top[1]);}else{document.getElementById('s-top').textContent='—';document.getElementById('s-top-time').textContent='žádná data';}}
function renderMembersTab(logs){const mm={},mn={};logs.forEach(l=>{mm[l.memberId]=(mm[l.memberId]||0)+l.mins;mn[l.memberId]=l.memberName;});const tot=logs.reduce((s,l)=>s+l.mins,0),max=Math.max(...Object.values(mm),1);document.getElementById('member-bars').innerHTML=Object.entries(mm).sort((a,b)=>b[1]-a[1]).map(([id,m])=>{const p=Math.round((m/max)*100),c=mcolor(id);return'<div class="bar-item"><div class="bar-row"><div class="bar-name"><div class="avatar" style="background:'+c+';width:18px;height:18px;font-size:8px">'+inits(mn[id])+'</div>'+mn[id]+'</div><div class="bar-time">'+fmtHM(m)+'</div></div><div class="bar-bg"><div class="bar-fill" style="width:'+p+'%;background:'+c+'"></div></div></div>';}).join('')||'<div class="empty">Žádná data</div>';const cm={};logs.forEach(l=>{cm[l.cardId]=(cm[l.cardId]||0)+l.mins;});const maxc=Math.max(...Object.values(cm),1);document.getElementById('card-bars').innerHTML=Object.entries(cm).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([id,m])=>{const p=Math.round((m/maxc)*100),n=cardNames[id]||id;return'<div class="bar-item"><div class="bar-row"><div class="bar-name" title="'+n+'">'+n+'</div><div class="bar-time">'+fmtHM(m)+'</div></div><div class="bar-bg"><div class="bar-fill" style="width:'+p+'%;background:var(--accent)"></div></div></div>';}).join('')||'<div class="empty">Žádná data</div>';document.getElementById('tb-members').innerHTML=Object.entries(mm).sort((a,b)=>b[1]-a[1]).map(([id,m])=>{const cnt=logs.filter(l=>l.memberId===id).length,p=tot>0?Math.round((m/tot)*100):0,c=mcolor(id);return'<tr><td><div class="tdm"><div class="avatar" style="background:'+c+'">'+inits(mn[id])+'</div><span style="font-weight:500">'+mn[id]+'</span></div></td><td class="muted-cell">'+cnt+'</td><td class="time-mono">'+fmtHM(m)+'</td><td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar"><div class="progress-fill" style="width:'+p+'%"></div></div><span class="muted-cell">'+p+'%</span></div></td></tr>';}).join('')||'<tr><td colspan="4" class="empty">Žádná data</td></tr>';}
function renderCardsTab(logs){const cm={},cw={},cl={};logs.forEach(l=>{cm[l.cardId]=(cm[l.cardId]||0)+l.mins;(cw[l.cardId]=cw[l.cardId]||new Set()).add(l.memberId+'|'+l.memberName);if(!cl[l.cardId]&&l.cardLabels)cl[l.cardId]=l.cardLabels;});const max=Math.max(...Object.values(cm),1);document.getElementById('tb-cards').innerHTML=Object.entries(cm).sort((a,b)=>b[1]-a[1]).map(([id,m])=>{const avs=[...cw[id]||[]].map(w=>{const[mid,mn]=w.split('|');const c=mcolor(mid);return'<div class="avatar" style="background:'+c+';width:22px;height:22px;font-size:9px;margin-right:-4px">'+inits(mn)+'</div>';}).join('');const p=Math.round((m/max)*100),n=cardNames[id]||id,lbls=cl[id]||[];return'<tr><td><div class="tdm"><div class="dot" style="background:var(--accent)"></div><span style="font-weight:500">'+n+'</span></div></td><td>'+renderLabels(lbls)+'</td><td><div style="display:flex">'+avs+'</div></td><td class="time-mono">'+fmtHM(m)+'</td><td><div class="progress-bar" style="width:90px"><div class="progress-fill" style="width:'+p+'%"></div></div></td></tr>';}).join('')||'<tr><td colspan="5" class="empty">Žádná data</td></tr>';}
function populateDropdowns(logs){const members=[...new Map(logs.map(l=>[l.memberId,l.memberName])).entries()].sort((a,b)=>a[1].localeCompare(b[1]));const ms=document.getElementById('f-member'),mv=ms.value;ms.innerHTML='<option value="">Všichni</option>'+members.map(([id,n])=>'<option value="'+id+'">'+n+'</option>').join('');ms.value=mv;const cards=[...new Map(logs.map(l=>[l.cardId,cardNames[l.cardId]||l.cardId])).entries()].sort((a,b)=>a[1].localeCompare(b[1]));const cs=document.getElementById('f-card'),cv=cs.value;cs.innerHTML='<option value="">Všechny</option>'+cards.map(([id,n])=>'<option value="'+id+'">'+n+'</option>').join('');cs.value=cv;const labelSet=new Map();logs.forEach(l=>(l.cardLabels||[]).forEach(lb=>{if(lb.name)labelSet.set(lb.name,lb.color);}));const lbls=[...labelSet.entries()].sort((a,b)=>a[0].localeCompare(b[0]));const ls2=document.getElementById('f-label'),lv=ls2.value;ls2.innerHTML='<option value="">Všechny štítky</option>'+lbls.map(([n])=>'<option value="'+n+'">'+n+'</option>').join('');ls2.value=lv;}
function applyFilters(){lf.member=document.getElementById('f-member').value;lf.card=document.getElementById('f-card').value;lf.label=document.getElementById('f-label').value;lf.desc=document.getElementById('f-desc').value.trim().toLowerCase();lf.from=document.getElementById('f-from').value;lf.to=document.getElementById('f-to').value;renderLogTab();}
function clearFilters(){lf={member:'',card:'',label:'',desc:'',from:'',to:''};['f-member','f-card','f-label'].forEach(id=>{document.getElementById(id).value='';});document.getElementById('f-desc').value='';document.getElementById('f-from').value='';document.getElementById('f-to').value='';renderLogTab();}
function clearOne(key){lf[key]='';if(key==='member')document.getElementById('f-member').value='';if(key==='card')document.getElementById('f-card').value='';if(key==='label')document.getElementById('f-label').value='';if(key==='desc')document.getElementById('f-desc').value='';if(key==='from')document.getElementById('f-from').value='';if(key==='to')document.getElementById('f-to').value='';renderLogTab();}
function sortBy(key){if(ls.key===key)ls.dir=ls.dir==='asc'?'desc':'asc';else{ls.key=key;ls.dir=key==='date'?'desc':'asc';}renderLogTab();}
function renderLogTab(){let logs=byPeriod(allLogs);if(lf.member)logs=logs.filter(l=>l.memberId===lf.member);if(lf.card)logs=logs.filter(l=>l.cardId===lf.card);if(lf.label)logs=logs.filter(l=>(l.cardLabels||[]).some(lb=>lb.name===lf.label));if(lf.desc)logs=logs.filter(l=>(l.desc||'').toLowerCase().includes(lf.desc));if(lf.from)logs=logs.filter(l=>l.date>=lf.from);if(lf.to)logs=logs.filter(l=>l.date<=lf.to);logs=[...logs].sort((a,b)=>{let va=a[ls.key]||'',vb=b[ls.key]||'';if(ls.key==='mins'){va=+va;vb=+vb;}const r=va<vb?-1:va>vb?1:0;return ls.dir==='asc'?r:-r;});['memberName','cardName','mins','date'].forEach(k=>{const el=document.getElementById('si-'+k);if(el)el.textContent=ls.key===k?(ls.dir==='asc'?' ↑':' ↓'):'';});const tags=[];if(lf.member){const o=[...document.getElementById('f-member').options].find(o=>o.value===lf.member);tags.push({k:'member',label:'Člen: '+(o&&o.text||lf.member)});}if(lf.card){const o=[...document.getElementById('f-card').options].find(o=>o.value===lf.card);tags.push({k:'card',label:'Karta: '+(o&&o.text||lf.card)});}if(lf.label)tags.push({k:'label',label:'Štítek: '+lf.label});if(lf.desc)tags.push({k:'desc',label:'Popis: "'+lf.desc+'"'});if(lf.from)tags.push({k:'from',label:'Od: '+lf.from});if(lf.to)tags.push({k:'to',label:'Do: '+lf.to});document.getElementById('active-tags').innerHTML=tags.map(t=>'<span class="atag" onclick="clearOne(\''+t.k+'\')">'+t.label+' <span style="font-size:13px;line-height:1">×</span></span>').join('');const total=byPeriod(allLogs).length;document.getElementById('result-count').textContent=tags.length?logs.length+' z '+total+' záznamů':logs.length+' záznamů';document.getElementById('tb-log').innerHTML=logs.map(l=>{const c=mcolor(l.memberId),n=cardNames[l.cardId]||l.cardId;return'<tr><td><div class="tdm"><div class="avatar" style="background:'+c+'">'+inits(l.memberName)+'</div><span>'+l.memberName+'</span></div></td><td class="muted-cell" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+n+'</td><td>'+renderLabels(l.cardLabels)+'</td><td class="muted-cell">'+(l.desc||'—')+'</td><td class="time-mono">'+fmtHM(l.mins)+'</td><td class="muted-cell">'+l.date+'</td></tr>';}).join('')||'<tr><td colspan="6" class="empty">Žádné záznamy odpovídají filtrům</td></tr>';}
function setPeriod(p,btn){currentPeriod=p;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll();}
function setTab(tab,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');['members','cards','log'].forEach(n=>{document.getElementById('tab-'+n).style.display=n===tab?'block':'none';});}
function exportCSV(){let logs=byPeriod(allLogs);if(lf.member)logs=logs.filter(l=>l.memberId===lf.member);if(lf.card)logs=logs.filter(l=>l.cardId===lf.card);if(lf.label)logs=logs.filter(l=>(l.cardLabels||[]).some(lb=>lb.name===lf.label));if(lf.desc)logs=logs.filter(l=>(l.desc||'').toLowerCase().includes(lf.desc));if(lf.from)logs=logs.filter(l=>l.date>=lf.from);if(lf.to)logs=logs.filter(l=>l.date<=lf.to);const rows=[['Člen','Karta','Štítky','Popis','Minuty','Datum']];logs.forEach(l=>rows.push([l.memberName,cardNames[l.cardId]||l.cardId,(l.cardLabels||[]).map(lb=>lb.name).join('; '),l.desc||'',l.mins,l.date]));const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'})),download:'timetrack-'+new Date().toISOString().slice(0,10)+'.csv'}).click();}
init();
</script>
