<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>PrimeTime – Naplánovat komentář</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0D0D0F;--s:#16161A;--s2:#1E1E24;--s3:#26262E;
    --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.15);
    --txt:#F0EFE8;--m:#7A7A88;
    --ac:#6C5CE7;--ac2:#A29BFE;--gr:#00B894;
    --rb:rgba(214,48,49,0.14);--rt:#FF7675;
    --f:'Inter',sans-serif;--fm:'DM Mono',monospace;
  }
  html{background:var(--bg);}
  body{font-family:var(--f);background:var(--bg);color:var(--txt);width:268px;padding:0;margin:0;}

  /* Sekce */
  .sec{padding:12px 12px 0;}

  /* Nadpis sekce */
  .sl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:7px;}

  /* Karta chip */
  .cc{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:5px 9px;margin-bottom:10px;}
  .cd{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;}
  .cn{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Auth panel */
  #auth-panel{padding:12px;}
  .auth-box{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.2);border-radius:10px;padding:12px;}
  .auth-title{font-size:13px;font-weight:600;margin-bottom:6px;}
  .auth-desc{font-size:11px;color:var(--m);line-height:1.5;margin-bottom:12px;}
  .btn-auth{width:100%;padding:10px;background:var(--ac);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;transition:background .15s;}
  .btn-auth:hover{background:#7C6AF0;}
  .btn-auth:disabled{opacity:.5;cursor:not-allowed;}

  /* Formulář */
  #form-panel{padding:12px;}

  /* Member chip */
  .member-chip{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:6px 9px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;}
  .mav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:white;flex-shrink:0;}
  .mname{font-size:11px;font-weight:500;flex:1;}
  .mrevoke{background:none;border:none;color:var(--m);font-size:10px;cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .1s;font-family:var(--f);}
  .mrevoke:hover{background:var(--rb);color:var(--rt);}

  /* Textarea */
  .ta{width:100%;font-family:var(--f);font-size:12px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:8px 9px;color:var(--txt);outline:none;resize:vertical;min-height:72px;max-height:160px;line-height:1.5;}
  .ta:focus{border-color:var(--ac);}
  .ta::placeholder{color:var(--m);}

  /* Datetime řádek */
  .dt-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
  .dt-input{font-family:var(--f);font-size:11px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:7px 7px;color:var(--txt);outline:none;width:100%;}
  .dt-input:focus{border-color:var(--ac);}
  .dt-input::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer;}

  /* Tlačítko odeslat */
  .btn-send{width:100%;margin-top:10px;padding:10px;background:var(--ac);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-send:hover{background:#7C6AF0;}
  .btn-send:disabled{opacity:.45;cursor:not-allowed;}

  /* Feedback stavy */
  .feedback{margin-top:8px;padding:8px 10px;border-radius:7px;font-size:11px;font-weight:500;line-height:1.4;display:none;}
  .feedback.ok{display:block;background:rgba(0,184,148,.12);border:1px solid rgba(0,184,148,.25);color:#55EFC4;}
  .feedback.err{display:block;background:var(--rb);border:1px solid rgba(214,48,49,.25);color:var(--rt);}

  /* Naplánované joby */
  #jobs-section{border-top:1px solid var(--b);margin-top:10px;padding-top:10px;}
  .job-item{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--b);font-size:11px;}
  .job-item:last-child{border-bottom:none;}
  .job-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
  .job-info{flex:1;min-width:0;}
  .job-text{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .job-time{color:var(--m);font-size:10px;margin-top:2px;font-family:var(--fm);}

  /* Loading spinner */
  .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .divider{border:none;border-top:1px solid var(--b);margin:10px 0 0;}
  .empty{font-size:11px;color:var(--m);text-align:center;padding:10px 0;}
</style>
</head>
<body>

<!-- Auth panel — zobrazí se pokud člen nemá uložený token -->
<div id="auth-panel" style="display:none">
  <div class="sl" style="padding:12px 12px 0">Jednorázová autorizace</div>
  <div style="padding:0 12px 12px">
    <div class="auth-box">
      <div class="auth-title">Propojit s Trello</div>
      <div class="auth-desc">
        PrimeTime potřebuje tvoje oprávnění aby mohl odesílat komentáře tvým jménem v naplánovaný čas. Token bude zašifrovaně uložen a kdykoliv ho můžeš odvolat.
      </div>
      <button class="btn-auth" id="btn-auth" onclick="startAuth()">Autorizovat</button>
    </div>
  </div>
</div>

<!-- Formulář — zobrazí se po autorizaci -->
<div id="form-panel" style="display:none">
  <!-- Karta -->
  <div class="cc"><div class="cd"></div><div class="cn" id="card-name">—</div></div>

  <!-- Člen -->
  <div class="member-chip">
    <div class="mav" id="mav">—</div>
    <span class="mname" id="mname">—</span>
    <button class="mrevoke" onclick="revoke()" title="Odvolat oprávnění">Odvolat</button>
  </div>

  <!-- Text komentáře -->
  <div class="sl">Text komentáře</div>
  <textarea class="ta" id="comment-text" placeholder="Napiš komentář…" oninput="validate()"></textarea>

  <!-- Datum a čas -->
  <div class="sl" style="margin-top:10px">Kdy odeslat</div>
  <div class="dt-row">
    <input type="date" class="dt-input" id="send-date" onchange="validate()">
    <input type="time" class="dt-input" id="send-time" onchange="validate()">
  </div>

  <button class="btn-send" id="btn-send" onclick="scheduleComment()" disabled>
    Naplánovat
  </button>

  <div class="feedback" id="feedback"></div>

  <!-- Čekající joby tohoto člena na této kartě -->
  <div id="jobs-section" style="display:none">
    <div class="sl">Naplánované komentáře</div>
    <div id="jobs-list"></div>
  </div>
</div>

<!-- Loading stav při inicializaci -->
<div id="loading" style="padding:20px 12px;text-align:center;font-size:11px;color:var(--m);">
  Načítám…
</div>

<script>
const BACKEND = 'https://prime-time.vercel.app';
const t = TrelloPowerUp.iframe();

const COLS=['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function mc(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffffffff;return COLS[Math.abs(h)%COLS.length];}
function ini(n){const p=(n||'?').trim().split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}
function resize(){t.sizeTo(document.body).catch(()=>{});}

let cardId=null, cardNameStr='', memberId=null, memberName='', isAuthorized=false;

// ── Init ──────────────────────────────────────────────────
async function init(){
  try{
    const[card, member]=await Promise.all([
      t.card('id','name'),
      t.member('id','fullName'),
    ]);
    cardId=card.id; cardNameStr=card.name;
    memberId=member.id; memberName=member.fullName;

    document.getElementById('card-name').textContent=card.name;
    document.getElementById('mname').textContent=member.fullName;
    const av=document.getElementById('mav');
    av.textContent=ini(member.fullName);
    av.style.background=mc(member.id);

    // Nastav výchozí datum/čas na "zítra stejný čas"
    const tomorrow=new Date(Date.now()+24*3600*1000);
    document.getElementById('send-date').value=tomorrow.toISOString().slice(0,10);
    document.getElementById('send-time').value=tomorrow.toTimeString().slice(0,5);

    // Zkontroluj jestli má člen uložený token
    const stored=await t.get('member','private','pt-authorized');
    if(stored===true){
      isAuthorized=true;
      showForm();
      loadJobs();
    }else{
      showAuth();
    }
  }catch(e){
    document.getElementById('loading').textContent='Chyba: '+e.message;
  }
}

function showAuth(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth-panel').style.display='block';
  document.getElementById('form-panel').style.display='none';
  resize();
}
function showForm(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth-panel').style.display='none';
  document.getElementById('form-panel').style.display='block';
  resize();
}

// ── OAuth autorizace ──────────────────────────────────────
async function startAuth(){
  const btn=document.getElementById('btn-auth');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> Autorizuji…';

  try{
    // Trello Power-Up OAuth — uživatel odklikne "Allow" v Trello dialogu
    const restApi=await t.getRestApi();
    const token=await restApi.getToken();

    // Pošli token na backend který ho ověří a zašifrovaně uloží
    const res=await fetch(`${BACKEND}/api/auth`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({memberId, token}),
    });
    const data=await res.json();

    if(!res.ok) throw new Error(data.error||'Chyba autorizace');

    // Ulož příznak autorizace do Trello member private storage
    await t.set('member','private','pt-authorized',true);
    isAuthorized=true;
    showForm();
    loadJobs();
  }catch(e){
    btn.disabled=false;
    btn.textContent='Autorizovat';
    showFeedback('err','Chyba: '+e.message);
  }
}

// ── Odvolání tokenu ───────────────────────────────────────
async function revoke(){
  if(!confirm('Odvolat oprávnění? Všechny naplánované komentáře budou zrušeny.'))return;
  try{
    const restApi=await t.getRestApi();
    const token=await restApi.getToken();
    await fetch(`${BACKEND}/api/revoke`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({memberId, token}),
    });
    await t.remove('member','private','pt-authorized');
    isAuthorized=false;
    showAuth();
  }catch(e){
    showFeedback('err','Chyba: '+e.message);
  }
}

// ── Validace formuláře ────────────────────────────────────
function validate(){
  const text=document.getElementById('comment-text').value.trim();
  const date=document.getElementById('send-date').value;
  const time=document.getElementById('send-time').value;
  const ok=text.length>0&&date&&time;
  document.getElementById('btn-send').disabled=!ok;
  return ok;
}

// ── Naplánování komentáře ─────────────────────────────────
async function scheduleComment(){
  if(!validate())return;

  const text=document.getElementById('comment-text').value.trim();
  const date=document.getElementById('send-date').value;
  const time=document.getElementById('send-time').value;
  const sendAt=new Date(`${date}T${time}`).toISOString();

  const btn=document.getElementById('btn-send');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> Plánuji…';

  try{
    const res=await fetch(`${BACKEND}/api/schedule`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({memberId, cardId, cardName:cardNameStr, text, sendAt}),
    });
    const data=await res.json();

    if(data.needsAuth){
      // Token vypršel — znovu autorizuj
      await t.remove('member','private','pt-authorized');
      showAuth();
      return;
    }
    if(!res.ok) throw new Error(data.error||'Chyba plánování');

    // Ulož job lokálně pro zobrazení v UI
    const jobs=await t.get('member','private','pt-jobs')||[];
    jobs.push({
      jobId:data.jobId,
      text,
      sendAt,
      cardId,
    });
    await t.set('member','private','pt-jobs',jobs);

    // Reset formuláře
    document.getElementById('comment-text').value='';
    btn.innerHTML='Naplánovat';
    showFeedback('ok','✓ Naplánováno na '+formatDT(sendAt));
    loadJobs();
    resize();
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='Naplánovat';
    showFeedback('err','Chyba: '+e.message);
  }
}

// ── Zobrazení naplánovaných jobů ──────────────────────────
async function loadJobs(){
  const allJobs=await t.get('member','private','pt-jobs')||[];
  const jobs=allJobs.filter(j=>j.cardId===cardId&&new Date(j.sendAt)>new Date());
  const sec=document.getElementById('jobs-section');
  const list=document.getElementById('jobs-list');

  if(!jobs.length){sec.style.display='none';resize();return;}

  sec.style.display='block';
  list.innerHTML=jobs.sort((a,b)=>a.sendAt.localeCompare(b.sendAt)).map(j=>`
    <div class="job-item">
      <div class="job-icon">🕐</div>
      <div class="job-info">
        <div class="job-text">${escHtml(j.text)}</div>
        <div class="job-time">${formatDT(j.sendAt)}</div>
      </div>
    </div>
  `).join('');
  resize();
}

// ── Helpers ───────────────────────────────────────────────
function formatDT(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showFeedback(type, msg){
  const el=document.getElementById('feedback');
  el.className='feedback '+type;
  el.textContent=msg;
  resize();
  if(type==='ok') setTimeout(()=>{el.style.display='none';resize();},4000);
}

init();
</script>
</body>
</html>
