<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>TimeTrack</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0D0D0F;
    --surface: #16161A;
    --s2:      #1E1E24;
    --s3:      #26262E;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text:    #F0EFE8;
    --muted:   #7A7A88;
    --accent:  #6C5CE7;
    --accent2: #A29BFE;
    --green:   #00B894;
    --red-bg:  rgba(214,48,49,0.15);
    --red-txt: #FF7675;
    --red-bdr: rgba(214,48,49,0.25);
    --fb: 'Inter', sans-serif;
    --fm: 'DM Mono', monospace;
  }

  /* Backdrop – průhledné, kliknutí mimo nezavírá */
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    font-family: var(--fb);
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  /* ── Floating okno ──────────────────────────────────── */
  #win {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 380px;
    min-height: 420px;
    /* Výchozí pozice/velikost – přepíše se z localStorage */
    width: 460px;
    height: 580px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* ── Titlebar (drag handle) ─────────────────────────── */
  #titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    height: 44px;
    background: var(--s2);
    border-bottom: 1px solid var(--border);
    cursor: grab;
    flex-shrink: 0;
  }
  #titlebar:active { cursor: grabbing; }

  .title-left { display: flex; align-items: center; gap: 8px; }
  .title-logo { width: 20px; height: 20px; background: var(--accent); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .title-text { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }

  .title-right { display: flex; align-items: center; gap: 6px; }
  .win-btn {
    width: 28px; height: 28px; border-radius: 7px; border: none;
    background: var(--s3); color: var(--muted); cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; line-height: 1;
  }
  .win-btn:hover { background: var(--border2); color: var(--text); }
  .win-btn.close:hover { background: var(--red-bg); color: var(--red-txt); }

  /* Running indicator v titlebaru */
  .running-pill {
    display: none;
    align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500;
    color: var(--green);
    background: rgba(0,184,148,0.12);
    border: 1px solid rgba(0,184,148,0.2);
    border-radius: 6px; padding: 2px 8px;
    font-family: var(--fm);
  }
  .running-pill.show { display: flex; }
  .rpulse { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Obsah okna ─────────────────────────────────────── */
  #body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Karta chip */
  .card-chip {
    display: flex; align-items: center; gap: 7px;
    margin: 14px 16px 0;
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 6px 12px;
    flex-shrink: 0;
  }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .chip-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Clock */
  .clock-area {
    text-align: center;
    padding: 20px 16px 16px;
    flex-shrink: 0;
  }
  #clock {
    font-family: var(--fm); font-size: 56px; font-weight: 500;
    letter-spacing: -3px; line-height: 1; color: var(--text);
    transition: color 0.3s;
  }
  #clock.running { color: var(--accent2); }
  #clock-sub { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--fm); min-height: 18px; }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
    padding: 0 16px 14px;
    flex-shrink: 0;
  }
  .btn {
    padding: 11px 10px; border-radius: 9px; border: none;
    font-family: var(--fb); font-weight: 600; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    white-space: nowrap;
  }
  .btn-start { background: var(--accent); color: white; }
  .btn-start:hover { background: #7C6AF0; transform: translateY(-1px); }
  .btn-stop { background: var(--red-bg); color: var(--red-txt); border: 1px solid var(--red-bdr); }
  .btn-stop:hover { background: rgba(214,48,49,0.25); }
  .btn-reset { background: var(--s2); color: var(--muted); border: 1px solid var(--border); padding: 11px 16px; }
  .btn-reset:hover { background: var(--s3); color: var(--text); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
  .hidden { display: none !important; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 0 16px 14px; flex-shrink: 0; }

  /* Manuální zadání */
  .manual-section { padding: 0 16px 14px; flex-shrink: 0; }
  .section-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; }
  .manual-row { display: grid; grid-template-columns: 54px 14px 54px 1fr auto; gap: 6px; align-items: center; }
  .time-input {
    font-family: var(--fm); font-size: 15px;
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 6px; color: var(--text);
    width: 100%; text-align: center; outline: none;
    -moz-appearance: textfield;
  }
  .time-input::-webkit-inner-spin-button,
  .time-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .time-input:focus { border-color: var(--accent); }
  .time-sep { color: var(--muted); font-family: var(--fm); font-size: 18px; text-align: center; }
  .desc-input {
    font-family: var(--fb); font-size: 13px;
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 10px; color: var(--text); outline: none; width: 100%;
  }
  .desc-input:focus { border-color: var(--accent); }
  .desc-input::placeholder { color: var(--muted); }
  .btn-add {
    padding: 9px 14px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--fb); transition: background 0.15s; white-space: nowrap;
  }
  .btn-add:hover { background: #7C6AF0; }

  /* ── Log sekce (scrollovatelná, roste se zbytkem prostoru) ── */
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 8px; flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  #log-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px;
    user-select: text;
  }
  #log-scroll::-webkit-scrollbar { width: 3px; }
  #log-scroll::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 3px; }

  .log-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .log-entry:last-child { border-bottom: none; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: white; flex-shrink: 0; }
  .log-info { flex: 1; min-width: 0; }
  .log-desc { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-time { font-family: var(--fm); font-size: 12px; color: var(--accent2); flex-shrink: 0; font-weight: 500; }
  .log-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 5px; border-radius: 4px; line-height: 1; flex-shrink: 0; transition: all 0.1s; }
  .log-del:hover { background: var(--red-bg); color: var(--red-txt); }

  /* Footer s celkovým časem */
  #log-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .total-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .total-value { font-family: var(--fm); font-size: 14px; color: var(--accent2); font-weight: 500; }

  .empty { font-size: 13px; color: var(--muted); text-align: center; padding: 24px 0; }

  /* ── Resize handle (pravý dolní roh) ──────────────────── */
  #resize-handle {
    position: absolute; bottom: 0; right: 0;
    width: 18px; height: 18px; cursor: se-resize;
    opacity: 0.3; transition: opacity 0.2s;
  }
  #resize-handle:hover { opacity: 0.7; }
  #resize-handle::before, #resize-handle::after {
    content: ''; position: absolute; background: var(--muted); border-radius: 2px;
  }
  #resize-handle::before { width: 10px; height: 1.5px; bottom: 7px; right: 3px; transform: rotate(-45deg); }
  #resize-handle::after  { width: 6px;  height: 1.5px; bottom: 4px; right: 3px; transform: rotate(-45deg); }

  /* ── Toast ──────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--s2); border: 1px solid var(--border2); border-radius: 9px;
    padding: 9px 18px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Preview banner */
  #preview-banner {
    display: none; background: rgba(108,92,231,0.12);
    border-bottom: 1px solid rgba(108,92,231,0.2);
    padding: 5px 16px; font-size: 11px; color: var(--accent2); flex-shrink: 0;
  }
  #preview-banner.show { display: block; }
</style>
</head>
<body>

<div id="win">

  <!-- Titlebar -->
  <div id="titlebar">
    <div class="title-left">
      <div class="title-logo">⏱</div>
      <span class="title-text">TimeTrack</span>
      <div class="running-pill" id="running-pill">
        <span class="rpulse"></span>
        <span id="running-pill-text">0:00 běží</span>
      </div>
    </div>
    <div class="title-right">
      <button class="win-btn" onclick="resetWinPos()" title="Výchozí pozice">⊹</button>
      <button class="win-btn close" onclick="closeModal()" title="Zavřít">✕</button>
    </div>
  </div>

  <!-- Obsah -->
  <div id="body">
    <div id="preview-banner">Preview – mimo Trello. Data jsou ukázková.</div>

    <div class="card-chip">
      <div class="chip-dot"></div>
      <div class="chip-name" id="card-name">Načítám…</div>
    </div>

    <div class="clock-area">
      <div id="clock">00:00:00</div>
      <div id="clock-sub">Připraven ke spuštění</div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btn-start" onclick="startTimer()">▶ Spustit</button>
      <button class="btn btn-stop hidden" id="btn-stop" onclick="stopTimer()">■ Zastavit</button>
      <button class="btn btn-reset" id="btn-reset" onclick="resetTimer()" disabled>↺ Reset</button>
    </div>

    <hr class="divider">

    <div class="manual-section">
      <div class="section-label">Přidat čas manuálně</div>
      <div class="manual-row">
        <input type="number" class="time-input" id="mh" placeholder="hh" min="0" max="99">
        <span class="time-sep">:</span>
        <input type="number" class="time-input" id="mm" placeholder="mm" min="0" max="59">
        <input type="text" class="desc-input" id="mdesc" placeholder="Co jsi dělal/a?">
        <button class="btn-add" onclick="addManual()">+ Přidat</button>
      </div>
    </div>

    <div class="log-header">
      <div class="section-label" style="margin-bottom:0">Záznamy na této kartě</div>
      <span id="log-count" style="font-size:11px;color:var(--muted)"></span>
    </div>

    <div id="log-scroll">
      <div class="empty">Načítám…</div>
    </div>

    <div id="log-footer">
      <span class="total-label">Celkem</span>
      <span class="total-value" id="log-total">—</span>
    </div>
  </div>

  <!-- Resize handle -->
  <div id="resize-handle"></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// PROSTŘEDÍ
// ═══════════════════════════════════════════════════════════════
const IN_TRELLO = (() => {
  try { return window.self !== window.top && typeof TrelloPowerUp !== 'undefined'; }
  catch(e) { return false; }
})();

const MOCK_CARD   = { id:'prev-c1', name:'Teambuilding (preview)' };
const MOCK_MEMBER = { id:'prev-m1', fullName:'Jakub Novák' };
const MOCK_PERMS  = { admins:[], trackers:['prev-m1'] };
let   MOCK_LOGS   = [
  { id:'l1', memberId:'prev-m1', memberName:'Jakub Novák',   cardId:'prev-c1', cardName:'Teambuilding', mins:90,  desc:'Příprava programu',  date:'2026-03-26' },
  { id:'l2', memberId:'prev-m1', memberName:'Jakub Novák',   cardId:'prev-c1', cardName:'Teambuilding', mins:45,  desc:'Email koordinace',   date:'2026-03-27' },
  { id:'l3', memberId:'prev-m2', memberName:'Tereza Dvořák', cardId:'prev-c1', cardName:'Teambuilding', mins:120, desc:'Booking ubytování',  date:'2026-03-27' },
];

let _t = null;
if (IN_TRELLO) _t = TrelloPowerUp.iframe();

const api = {
  card:   (...f) => IN_TRELLO ? _t.card(...f)   : Promise.resolve(MOCK_CARD),
  member: (...f) => IN_TRELLO ? _t.member(...f) : Promise.resolve(MOCK_MEMBER),
  get: (s,v,k) => {
    if (IN_TRELLO) return _t.get(s,v,k);
    if (k==='tt-logs')        return Promise.resolve(MOCK_LOGS);
    if (k==='tt-permissions') return Promise.resolve(MOCK_PERMS);
    return Promise.resolve(null);
  },
  set: (s,v,k,val) => {
    if (IN_TRELLO) return _t.set(s,v,k,val);
    if (k==='tt-logs') MOCK_LOGS = val;
    return Promise.resolve();
  },
  remove: (s,v,k) => IN_TRELLO ? _t.remove(s,v,k) : Promise.resolve(),
  closeModal: () => { if (IN_TRELLO) _t.closeModal(); },
};

// ═══════════════════════════════════════════════════════════════
// DRAG & RESIZE  +  PERSIST POZICE / VELIKOSTI
// ═══════════════════════════════════════════════════════════════
const WIN_KEY = 'tt-win-state';
const win = document.getElementById('win');

function loadWinState() {
  try {
    const s = JSON.parse(localStorage.getItem(WIN_KEY));
    if (!s) return;
    const maxW = window.innerWidth, maxH = window.innerHeight;
    win.style.width  = Math.min(s.w, maxW - 40) + 'px';
    win.style.height = Math.min(s.h, maxH - 40) + 'px';
    win.style.left   = Math.max(0, Math.min(s.x, maxW - 200)) + 'px';
    win.style.top    = Math.max(0, Math.min(s.y, maxH - 100)) + 'px';
    win.style.transform = 'none';
  } catch(e) {}
}

function saveWinState() {
  const r = win.getBoundingClientRect();
  localStorage.setItem(WIN_KEY, JSON.stringify({ x: r.left, y: r.top, w: r.width, h: r.height }));
}

function resetWinPos() {
  localStorage.removeItem(WIN_KEY);
  win.style.width  = '460px';
  win.style.height = '580px';
  win.style.left   = '50%';
  win.style.top    = '50%';
  win.style.transform = 'translate(-50%,-50%)';
}

// Drag
const titlebar = document.getElementById('titlebar');
let dragging = false, dragOX = 0, dragOY = 0;

titlebar.addEventListener('mousedown', e => {
  if (e.target.closest('.win-btn')) return;
  dragging = true;
  const r = win.getBoundingClientRect();
  // Pokud je okno stále transformované (centered), přepneme na absolutní px
  if (win.style.transform !== 'none') {
    win.style.left = r.left + 'px';
    win.style.top  = r.top  + 'px';
    win.style.transform = 'none';
  }
  dragOX = e.clientX - r.left;
  dragOY = e.clientY - r.top;
  document.body.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const x = Math.max(0, Math.min(e.clientX - dragOX, window.innerWidth  - win.offsetWidth));
  const y = Math.max(0, Math.min(e.clientY - dragOY, window.innerHeight - 60));
  win.style.left = x + 'px';
  win.style.top  = y + 'px';
});

document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  document.body.style.cursor = '';
  saveWinState();
});

// Resize (dolní pravý roh)
const resizeHandle = document.getElementById('resize-handle');
let resizing = false, resOX = 0, resOY = 0, resW0 = 0, resH0 = 0;

resizeHandle.addEventListener('mousedown', e => {
  e.preventDefault(); e.stopPropagation();
  resizing = true;
  resOX = e.clientX; resOY = e.clientY;
  resW0 = win.offsetWidth; resH0 = win.offsetHeight;
  document.body.style.cursor = 'se-resize';
});

document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const nw = Math.max(380, resW0 + e.clientX - resOX);
  const nh = Math.max(420, resH0 + e.clientY - resOY);
  win.style.width  = nw + 'px';
  win.style.height = nh + 'px';
});

document.addEventListener('mouseup', () => {
  if (!resizing) return;
  resizing = false;
  document.body.style.cursor = '';
  saveWinState();
});

// Touch drag (mobile)
titlebar.addEventListener('touchstart', e => {
  if (e.target.closest('.win-btn')) return;
  const touch = e.touches[0];
  const r = win.getBoundingClientRect();
  if (win.style.transform !== 'none') {
    win.style.left = r.left + 'px'; win.style.top = r.top + 'px'; win.style.transform = 'none';
  }
  dragOX = touch.clientX - r.left; dragOY = touch.clientY - r.top;
}, { passive: true });

titlebar.addEventListener('touchmove', e => {
  const t = e.touches[0];
  const x = Math.max(0, Math.min(t.clientX - dragOX, window.innerWidth  - win.offsetWidth));
  const y = Math.max(0, Math.min(t.clientY - dragOY, window.innerHeight - 60));
  win.style.left = x + 'px'; win.style.top = y + 'px'; win.style.transform = 'none';
}, { passive: true });

titlebar.addEventListener('touchend', saveWinState);

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const COLORS = ['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function memberColor(id) {
  let h=0; for(const c of String(id)) h=(h*31+c.charCodeAt(0))&0xffffffff;
  return COLORS[Math.abs(h)%COLORS.length];
}
function initials(name) {
  const p=(name||'?').trim().split(' ');
  return (p[0][0]+(p[1]?.[0]||'')).toUpperCase();
}
function fmtSecs(s) {
  return [Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');
}
function fmtHM(mins) {
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?`${h}h ${m}m`:`${m}m`;
}
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function closeModal() { api.closeModal(); }

// ═══════════════════════════════════════════════════════════════
// STAV
// ═══════════════════════════════════════════════════════════════
let cardId=null, cardNameStr='', currentMember=null, isAdmin=false;
let timerSecs=0, timerInterval=null, timerRunning=false;
let pillInterval=null;

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  loadWinState();
  if (!IN_TRELLO) document.getElementById('preview-banner').classList.add('show');

  try {
    const [card, member, perms] = await Promise.all([
      api.card('id','name'),
      api.member('id','fullName'),
      api.get('board','shared','tt-permissions'),
    ]);

    cardId      = card.id;
    cardNameStr = card.name;
    currentMember = member;
    document.getElementById('card-name').textContent = card.name;

    const adminIds = perms?.admins || [];
    isAdmin = adminIds.length===0 || adminIds.includes(member.id);

    const running = await api.get('member','private',`tt-running-${cardId}`);
    if (running?.startedAt) {
      timerSecs = Math.floor((Date.now()-running.startedAt)/1000);
      resumeTimer();
    }

    await renderLog();
  } catch(err) {
    document.getElementById('log-scroll').innerHTML =
      `<div class="empty" style="color:#FF7675">Chyba: ${err.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════════
function updateRunningPill() {
  const h = Math.floor(timerSecs/3600);
  const m = Math.floor((timerSecs%3600)/60);
  const s = timerSecs%60;
  const txt = h>0 ? `${h}:${String(m).padStart(2,'0')} běží` : `${m}:${String(s).padStart(2,'0')} běží`;
  document.getElementById('running-pill-text').textContent = txt;
}

async function startTimer() {
  timerRunning=true;
  const startedAt=Date.now()-timerSecs*1000;
  await api.set('member','private',`tt-running-${cardId}`,{startedAt});
  timerInterval=setInterval(()=>{
    timerSecs++;
    document.getElementById('clock').textContent=fmtSecs(timerSecs);
    updateRunningPill();
  },1000);
  document.getElementById('clock').classList.add('running');
  document.getElementById('clock-sub').innerHTML=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 1.4s infinite;vertical-align:middle"></span>Časovač běží…`;
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=true;
  document.getElementById('running-pill').classList.add('show');
  updateRunningPill();
}

function resumeTimer() {
  timerRunning=true;
  document.getElementById('clock').textContent=fmtSecs(timerSecs);
  document.getElementById('clock').classList.add('running');
  document.getElementById('clock-sub').innerHTML=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 1.4s infinite;vertical-align:middle"></span>Časovač běží…`;
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=true;
  document.getElementById('running-pill').classList.add('show');
  updateRunningPill();
  timerInterval=setInterval(()=>{
    timerSecs++;
    document.getElementById('clock').textContent=fmtSecs(timerSecs);
    updateRunningPill();
  },1000);
}

async function stopTimer() {
  clearInterval(timerInterval); timerRunning=false;
  await api.remove('member','private',`tt-running-${cardId}`);
  const mins=Math.max(1,Math.round(timerSecs/60));
  await saveLog({mins,desc:''});
  document.getElementById('clock').classList.remove('running');
  document.getElementById('btn-stop').classList.add('hidden');
  document.getElementById('btn-start').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=false;
  document.getElementById('clock-sub').textContent=`Zalogováno ${fmtHM(mins)}`;
  document.getElementById('running-pill').classList.remove('show');
  timerSecs=0;
  document.getElementById('clock').textContent='00:00:00';
  toast(`✓ Zalogováno ${fmtHM(mins)}`);
  await renderLog();
}

function resetTimer() {
  timerSecs=0;
  document.getElementById('clock').textContent='00:00:00';
  document.getElementById('clock-sub').textContent='Připraven ke spuštění';
  document.getElementById('btn-reset').disabled=true;
}

// ═══════════════════════════════════════════════════════════════
// MANUÁLNÍ ZADÁNÍ
// ═══════════════════════════════════════════════════════════════
async function addManual() {
  const h=parseInt(document.getElementById('mh').value)||0;
  const m=parseInt(document.getElementById('mm').value)||0;
  const mins=h*60+m;
  if(mins<=0){toast('Zadej platný čas');return;}
  const desc=document.getElementById('mdesc').value.trim();
  await saveLog({mins,desc});
  document.getElementById('mh').value='';
  document.getElementById('mm').value='';
  document.getElementById('mdesc').value='';
  toast(`✓ Přidáno ${fmtHM(mins)}`);
  await renderLog();
}

// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
async function saveLog({mins,desc}) {
  const logs=await api.get('board','shared','tt-logs')||[];
  logs.push({
    id:genId(),
    memberId:currentMember.id,
    memberName:currentMember.fullName,
    cardId,
    cardName: cardNameStr,
    mins, desc,
    date:new Date().toISOString().slice(0,10),
  });
  await api.set('board','shared','tt-logs',logs);
  const cardMins=logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0);
  await api.set('card','shared','tt-total',cardMins);
}

async function deleteLog(logId) {
  const logs=(await api.get('board','shared','tt-logs')||[]).filter(l=>l.id!==logId);
  await api.set('board','shared','tt-logs',logs);
  const cardMins=logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0);
  await api.set('card','shared','tt-total',cardMins);
  await renderLog();
}

// ═══════════════════════════════════════════════════════════════
// RENDER LOGU
// ═══════════════════════════════════════════════════════════════
async function renderLog() {
  const allLogs=await api.get('board','shared','tt-logs')||[];
  const logs=allLogs.filter(l=>l.cardId===cardId);
  const visible=isAdmin?logs:logs.filter(l=>l.memberId===currentMember.id);
  const el=document.getElementById('log-scroll');
  const totalMins=visible.reduce((s,l)=>s+l.mins,0);
  document.getElementById('log-total').textContent=totalMins>0?fmtHM(totalMins):'—';
  document.getElementById('log-count').textContent=visible.length>0?`${visible.length} záznamů`:'';

  if(!visible.length){
    el.innerHTML='<div class="empty">Žádné záznamy pro tuto kartu</div>';
    return;
  }
  el.innerHTML=[...visible].reverse().map(l=>{
    const color=memberColor(l.memberId);
    const ini=initials(l.memberName);
    const canDel=isAdmin||l.memberId===currentMember?.id;
    return `<div class="log-entry">
      <div class="avatar" style="background:${color}">${ini}</div>
      <div class="log-info">
        <div class="log-desc">${l.desc||'—'}</div>
        <div class="log-meta">${l.memberName} · ${l.date}</div>
      </div>
      <div class="log-time">${fmtHM(l.mins)}</div>
      ${canDel?`<button class="log-del" onclick="deleteLog('${l.id}')" title="Smazat">×</button>`:''}
    </div>`;
  }).join('');
}

init();
</script>
