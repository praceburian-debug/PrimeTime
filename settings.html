<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>PrimeTime – Nastavení</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#0D0D0F;--s:#16161A;--s2:#1E1E24;--s3:#26262E;--b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.14);--txt:#F0EFE8;--m:#7A7A88;--ac:#6C5CE7;--ac2:#A29BFE;--gr:#00B894;--f:'Inter',sans-serif;}
  body{font-family:var(--f);background:var(--bg);color:var(--txt);padding:0;}
  .sec{padding:12px 14px;border-bottom:1px solid var(--b);}
  .st{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-bottom:8px;}
  .info{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.2);border-radius:7px;padding:8px 10px;font-size:11px;color:var(--ac2);margin-bottom:8px;line-height:1.5;}
  .legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
  .pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid;}
  .pa{background:rgba(108,92,231,.15);color:var(--ac2);border-color:rgba(108,92,231,.3);}
  .pt{background:rgba(0,184,148,.12);color:#55EFC4;border-color:rgba(0,184,148,.25);}
  .pn{background:rgba(255,255,255,.04);color:var(--m);border-color:var(--b2);}
  .mi{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b);}
  .mi:last-child{border-bottom:none;}
  .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0;}
  .mn2{flex:1;}
  .mn2 .name{font-size:13px;font-weight:500;}
  .mn2 .uname{font-size:11px;color:var(--m);}
  .sb{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(108,92,231,.2);color:var(--ac2);margin-left:5px;}
  select.rs{background:var(--s2);border:1px solid var(--b2);color:var(--txt);border-radius:7px;padding:5px 8px;font-size:12px;font-family:var(--f);outline:none;cursor:pointer;flex-shrink:0;}
  select.rs:focus{border-color:var(--ac);}
  .save{display:block;width:calc(100% - 28px);margin:12px 14px;padding:10px;background:var(--ac);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:var(--f);cursor:pointer;transition:background .15s;}
  .save:hover{background:#7C6AF0;}
  .save:disabled{opacity:.4;cursor:not-allowed;}
  .toast2{position:fixed;bottom:10px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;}
  .toast2.on{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading{padding:20px;text-align:center;color:var(--m);font-size:13px;}
</style>
</head>
<body>
<div id="loading" class="loading">Načítám členy…</div>
<div id="content" style="display:none">
  <div class="sec">
    <div class="st">Oprávnění</div>
    <div class="info">
      <strong>Admin</strong> – vidí Time Report, spravuje přístupy<br>
      <strong>Tracker</strong> – vidí časovač, loguje čas, vidí jen svůj čas v reportu<br>
      <strong>Bez přístupu</strong> – nevidí časovač vůbec
    </div>
    <div class="legend">
      <span class="pill pa">Admin</span>
      <span class="pill pt">Tracker</span>
      <span class="pill pn">Bez přístupu</span>
    </div>
  </div>
  <div class="sec">
    <div class="st">Členové nástěnky</div>
    <div id="mlist"></div>
  </div>
  <button class="save" id="btn-save" onclick="save()">Uložit nastavení</button>
</div>
<div class="toast2" id="t2"></div>
<script>
const t=TrelloPowerUp.iframe();
const COLS=['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function mc(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffffffff;return COLS[Math.abs(h)%COLS.length];}
function ini(n){const p=(n||'?').trim().split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}
function toast(msg){const e=document.getElementById('t2');e.textContent=msg;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2200);}
let mid=null,roleMap={};
async function init(){
  const[board,member,perms]=await Promise.all([t.board('members'),t.member('id'),t.get('board','shared','tt-permissions')]);
  mid=member.id;
  const admins=perms?.admins||[],trackers=perms?.trackers||[];
  board.members.forEach(m=>{
    if(admins.includes(m.id))roleMap[m.id]='admin';
    else if(trackers.includes(m.id))roleMap[m.id]='tracker';
    else roleMap[m.id]='none';
  });
  if(admins.length===0)roleMap[mid]='admin';
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('mlist').innerHTML=board.members.map(m=>{
    const c=mc(m.id),role=roleMap[m.id]||'none',isSelf=m.id===mid;
    return'<div class="mi"><div class="av" style="background:'+c+'">'+ini(m.fullName)+'</div><div class="mn2"><div class="name">'+m.fullName+(isSelf?'<span class="sb">já</span>':'')+'</div><div class="uname">@'+m.username+'</div></div><select class="rs" id="r-'+m.id+'" onchange="roleMap[\''+m.id+'\']=this.value"'+(isSelf?' disabled':'')+'><option value="admin"'+(role==='admin'?' selected':'')+'>Admin</option><option value="tracker"'+(role==='tracker'?' selected':'')+'>Tracker</option><option value="none"'+(role==='none'?' selected':'')+'>Bez přístupu</option></select></div>';
  }).join('');
}
async function save(){
  const btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Ukládám…';
  const admins=Object.entries(roleMap).filter(([,r])=>r==='admin').map(([id])=>id);
  const trackers=Object.entries(roleMap).filter(([,r])=>r==='tracker').map(([id])=>id);
  await t.set('board','shared','tt-permissions',{admins,trackers});
  btn.disabled=false;btn.textContent='Uložit nastavení';
  toast('✓ Nastavení uloženo');
  setTimeout(()=>t.closePopup(),1200);
}
init();
</script>
</body>
</html>
