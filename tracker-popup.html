<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>TimeTrack</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0D0D0F;
    --surface: #16161A;
    --s2:      #1E1E24;
    --s3:      #26262E;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text:    #F0EFE8;
    --muted:   #7A7A88;
    --accent:  #6C5CE7;
    --accent2: #A29BFE;
    --green:   #00B894;
    --red-bg:  rgba(214,48,49,0.14);
    --red-txt: #FF7675;
    --red-bdr: rgba(214,48,49,0.22);
    --fb: 'Inter', sans-serif;
    --fm: 'DM Mono', monospace;
  }

  /*
    Trello popup nastaví šířku iframe na šířku obsahu.
    Pevná šířka 560px = max co Trello popup dovolí bez oříznutí.
    Výška se nastavuje přes t.sizeTo(document.body) — iframe se roztáhne
    na výšku body. "Fixed top" část je vždy vidět, log scrolluje interně.
  */
  html { background: var(--bg); }
  body {
    font-family: var(--fb);
    background: var(--bg);
    color: var(--text);
    width: 560px;
    /* Výška = fixed top + log (max 240px) + footer */
    /* t.sizeTo() ji nastaví dynamicky */
  }

  /* ── Preview banner ─────────────────────────── */
  #preview-banner {
    display: none;
    background: rgba(108,92,231,0.12);
    border-bottom: 1px solid rgba(108,92,231,0.2);
    padding: 6px 18px; font-size: 11px; color: var(--accent2);
  }
  #preview-banner.show { display: block; }

  /* ── Karta chip ─────────────────────────────── */
  .card-area { padding: 14px 18px 0; }
  .card-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 7px 12px;
  }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .chip-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

  /* Štítky karty */
  .labels-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .label-pill {
    font-size: 10px; font-weight: 600; padding: 2px 9px;
    border-radius: 20px; color: white;
    text-transform: uppercase; letter-spacing: 0.04em;
  }

  /* ── Hodiny ─────────────────────────────────── */
  .clock-area {
    text-align: center;
    padding: 18px 18px 14px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-top: 14px;
    background: linear-gradient(135deg, rgba(108,92,231,0.05) 0%, transparent 60%);
  }
  #clock {
    font-family: var(--fm); font-size: 54px; font-weight: 500;
    letter-spacing: -3px; line-height: 1; color: var(--text); transition: color 0.3s;
  }
  #clock.running { color: var(--accent2); }
  #clock-sub { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--fm); min-height: 18px; }

  /* ── Controls ───────────────────────────────── */
  .controls {
    display: grid; grid-template-columns: 1fr 1fr auto;
    gap: 8px; padding: 14px 18px;
  }
  .btn {
    padding: 11px 10px; border-radius: 9px; border: none;
    font-family: var(--fb); font-weight: 600; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    white-space: nowrap;
  }
  .btn-start { background: var(--accent); color: white; }
  .btn-start:hover { background: #7C6AF0; transform: translateY(-1px); }
  .btn-stop { background: var(--red-bg); color: var(--red-txt); border: 1px solid var(--red-bdr); }
  .btn-stop:hover { background: rgba(214,48,49,0.24); }
  .btn-reset { background: var(--s2); color: var(--muted); border: 1px solid var(--border); padding: 11px 16px; }
  .btn-reset:hover { background: var(--s3); color: var(--text); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
  .hidden { display: none !important; }

  /* ── Manuální zadání ────────────────────────── */
  .manual-section { padding: 0 18px 14px; border-bottom: 1px solid var(--border); }
  .section-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; }
  .manual-row {
    display: grid;
    grid-template-columns: 54px 14px 54px 1fr auto;
    gap: 6px; align-items: center;
  }
  .time-input {
    font-family: var(--fm); font-size: 15px;
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 6px; color: var(--text);
    width: 100%; text-align: center; outline: none;
    -moz-appearance: textfield;
  }
  .time-input::-webkit-inner-spin-button,
  .time-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .time-input:focus { border-color: var(--accent); }
  .time-sep { color: var(--muted); font-family: var(--fm); font-size: 18px; text-align: center; }
  .desc-input {
    font-family: var(--fb); font-size: 13px;
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 10px; color: var(--text); outline: none; width: 100%;
  }
  .desc-input:focus { border-color: var(--accent); }
  .desc-input::placeholder { color: var(--muted); }
  .btn-add {
    padding: 9px 14px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--fb); transition: background 0.15s; white-space: nowrap;
  }
  .btn-add:hover { background: #7C6AF0; }

  /* ── Log sekce ──────────────────────────────── */
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px 8px;
  }
  .log-count { font-size: 11px; color: var(--muted); }

  /*
    Log scroll: max-height 240px = ~4–5 záznamů.
    Když je méně, bude nižší (t.sizeTo se přizpůsobí).
    Když je víc, zobrazí se scrollbar.
  */
  #log-scroll {
    max-height: 240px;
    overflow-y: auto;
    padding: 0 18px;
  }
  #log-scroll::-webkit-scrollbar { width: 4px; }
  #log-scroll::-webkit-scrollbar-track { background: transparent; }
  #log-scroll::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 4px; }
  #log-scroll::-webkit-scrollbar-thumb:hover { background: var(--border2); }

  .log-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .log-entry:last-child { border-bottom: none; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: white; flex-shrink: 0;
  }
  .log-info { flex: 1; min-width: 0; }
  .log-desc { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-time { font-family: var(--fm); font-size: 12px; color: var(--accent2); flex-shrink: 0; font-weight: 500; }
  .log-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; padding: 2px 5px;
    border-radius: 4px; line-height: 1; flex-shrink: 0; transition: all 0.1s;
  }
  .log-del:hover { background: var(--red-bg); color: var(--red-txt); }

  /* ── Footer ─────────────────────────────────── */
  #log-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px 14px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }
  .total-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .total-value { font-family: var(--fm); font-size: 14px; color: var(--accent2); font-weight: 500; }

  .empty { font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; }

  /* ── Toast ──────────────────────────────────── */
  #toast {
    position: fixed; bottom: 12px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--s2); border: 1px solid var(--border2); border-radius: 9px;
    padding: 9px 18px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap; z-index: 99;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .running-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); margin-right: 6px; vertical-align: middle;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<div id="preview-banner">Preview – mimo Trello. Data jsou ukázková.</div>

<div class="card-area">
  <div class="card-chip">
    <div class="chip-dot" id="chip-dot"></div>
    <div class="chip-name" id="card-name">Načítám…</div>
  </div>
  <div class="labels-row" id="labels-row"></div>
</div>

<div class="clock-area">
  <div id="clock">00:00:00</div>
  <div id="clock-sub">Připraven ke spuštění</div>
</div>

<div class="controls">
  <button class="btn btn-start" id="btn-start" onclick="startTimer()">▶ Spustit</button>
  <button class="btn btn-stop hidden" id="btn-stop" onclick="stopTimer()">■ Zastavit</button>
  <button class="btn btn-reset" id="btn-reset" onclick="resetTimer()" disabled>↺ Reset</button>
</div>

<div class="manual-section">
  <div class="section-label">Přidat čas manuálně</div>
  <div class="manual-row">
    <input type="number" class="time-input" id="mh" placeholder="hh" min="0" max="99">
    <span class="time-sep">:</span>
    <input type="number" class="time-input" id="mm" placeholder="mm" min="0" max="59">
    <input type="text" class="desc-input" id="mdesc" placeholder="Co jsi dělal/a?">
    <button class="btn-add" onclick="addManual()">+ Přidat</button>
  </div>
</div>

<div class="log-header">
  <div class="section-label" style="margin-bottom:0">Záznamy na této kartě</div>
  <span class="log-count" id="log-count"></span>
</div>

<div id="log-scroll">
  <div class="empty">Načítám…</div>
</div>

<div id="log-footer">
  <span class="total-label">Celkem</span>
  <span class="total-value" id="log-total">—</span>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// PROSTŘEDÍ
// ═══════════════════════════════════════════════════════
const IN_TRELLO = (() => {
  try { return window.self !== window.top && typeof TrelloPowerUp !== 'undefined'; }
  catch(e) { return false; }
})();

// Trello label colors → hex
const LABEL_COLORS = {
  green:'#61BD4F', yellow:'#F2D600', orange:'#FF9F1A', red:'#EB5A46',
  purple:'#C377E0', blue:'#0079BF', sky:'#00C2E0', lime:'#51E898',
  pink:'#FF78CB', black:'#344563',
  green_dark:'#519839', yellow_dark:'#D9B51C', orange_dark:'#D79B00',
  red_dark:'#B04632', purple_dark:'#89609E', blue_dark:'#055A8C',
  sky_dark:'#0098C7', lime_dark:'#4BBF6B', pink_dark:'#C9558F', black_dark:'#091E42',
  green_light:'#B7DDB0', yellow_light:'#F5EA92', orange_light:'#FAD29C',
  red_light:'#EFB3AB', purple_light:'#DFC0EB', blue_light:'#9AD0ED',
  sky_light:'#76D6ED', lime_light:'#B3F1D0', pink_light:'#F9C2E4', black_light:'#B6BFCE',
};
function labelHex(color) { return LABEL_COLORS[color] || '#888'; }

// Mock data
const MOCK_CARD   = { id:'prev-c1', name:'Teambuilding', labels:[{name:'Marketing',color:'blue'},{name:'Q2',color:'green'}] };
const MOCK_MEMBER = { id:'prev-m1', fullName:'Jakub Novák' };
const MOCK_PERMS  = { admins:[], trackers:['prev-m1'] };
let   MOCK_LOGS   = [
  { id:'l1', memberId:'prev-m1', memberName:'Jakub Novák',   cardId:'prev-c1', cardName:'Teambuilding', cardLabels:[{name:'Marketing',color:'blue'}], mins:90,  desc:'Příprava programu', date:'2026-03-26' },
  { id:'l2', memberId:'prev-m1', memberName:'Jakub Novák',   cardId:'prev-c1', cardName:'Teambuilding', cardLabels:[{name:'Marketing',color:'blue'}], mins:45,  desc:'Email koordinace',  date:'2026-03-27' },
  { id:'l3', memberId:'prev-m2', memberName:'Tereza Dvořák', cardId:'prev-c1', cardName:'Teambuilding', cardLabels:[{name:'Marketing',color:'blue'}], mins:120, desc:'Booking ubytování', date:'2026-03-27' },
  { id:'l4', memberId:'prev-m1', memberName:'Jakub Novák',   cardId:'prev-c1', cardName:'Teambuilding', cardLabels:[{name:'Marketing',color:'blue'}], mins:30,  desc:'Shrnutí akce',      date:'2026-03-28' },
  { id:'l5', memberId:'prev-m2', memberName:'Tereza Dvořák', cardId:'prev-c1', cardName:'Teambuilding', cardLabels:[{name:'Marketing',color:'blue'}], mins:60,  desc:'Fotodokumentace',   date:'2026-03-28' },
];

let _t = null;
if (IN_TRELLO) _t = TrelloPowerUp.iframe();

const api = {
  card:   (...f) => IN_TRELLO ? _t.card(...f)   : Promise.resolve(MOCK_CARD),
  member: (...f) => IN_TRELLO ? _t.member(...f) : Promise.resolve(MOCK_MEMBER),
  get: (s,v,k) => {
    if (IN_TRELLO) return _t.get(s,v,k);
    if (k==='tt-logs')        return Promise.resolve(MOCK_LOGS);
    if (k==='tt-permissions') return Promise.resolve(MOCK_PERMS);
    return Promise.resolve(null);
  },
  set: (s,v,k,val) => {
    if (IN_TRELLO) return _t.set(s,v,k,val);
    if (k==='tt-logs') MOCK_LOGS = val;
    return Promise.resolve();
  },
  remove: (s,v,k) => IN_TRELLO ? _t.remove(s,v,k) : Promise.resolve(),
  // Dynamická výška popupu — Trello iframe se přizpůsobí výšce body
  resize: () => { if (IN_TRELLO) _t.sizeTo(document.body).catch(()=>{}); },
};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const COLORS=['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function memberColor(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function initials(n){const p=(n||'?').trim().split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}
function fmtSecs(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');}
function fmtHM(mins){const h=Math.floor(mins/60),m=mins%60;return h>0?`${h}h ${m}m`:`${m}m`;}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ═══════════════════════════════════════════════════════
// STAV
// ═══════════════════════════════════════════════════════
let cardId=null, cardNameStr='', cardLabels=[], currentMember=null, isAdmin=false;
let timerSecs=0, timerInterval=null, timerRunning=false;

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  if (!IN_TRELLO) document.getElementById('preview-banner').classList.add('show');

  try {
    const [card, member, perms] = await Promise.all([
      api.card('id','name','labels'),   // ← načteme i labels
      api.member('id','fullName'),
      api.get('board','shared','tt-permissions'),
    ]);

    cardId      = card.id;
    cardNameStr = card.name;
    cardLabels  = card.labels || [];

    document.getElementById('card-name').textContent = card.name;

    // Vyrendrovat štítky karty
    renderCardLabels(cardLabels);

    const adminIds = perms?.admins || [];
    isAdmin = adminIds.length===0 || adminIds.includes(member.id);
    currentMember = member;

    // Obnov timer pokud běžel
    const running = await api.get('member','private',`tt-running-${cardId}`);
    if (running?.startedAt) {
      timerSecs = Math.floor((Date.now()-running.startedAt)/1000);
      resumeTimer();
    }

    await renderLog();
    api.resize();
  } catch(err) {
    document.getElementById('log-scroll').innerHTML =
      `<div class="empty" style="color:#FF7675">Chyba: ${err.message}</div>`;
    api.resize();
  }
}

function renderCardLabels(labels) {
  const row = document.getElementById('labels-row');
  if (!labels || !labels.length) { row.style.display='none'; return; }
  row.innerHTML = labels.map(l =>
    `<span class="label-pill" style="background:${labelHex(l.color)}">${l.name||'&nbsp;&nbsp;&nbsp;&nbsp;'}</span>`
  ).join('');
  api.resize();
}

// ═══════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════
async function startTimer() {
  timerRunning=true;
  const startedAt=Date.now()-timerSecs*1000;
  await api.set('member','private',`tt-running-${cardId}`,{startedAt});
  timerInterval=setInterval(()=>{
    timerSecs++;
    document.getElementById('clock').textContent=fmtSecs(timerSecs);
  },1000);
  document.getElementById('clock').classList.add('running');
  document.getElementById('clock-sub').innerHTML='<span class="running-dot"></span>Časovač běží…';
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=true;
}

function resumeTimer() {
  timerRunning=true;
  document.getElementById('clock').textContent=fmtSecs(timerSecs);
  document.getElementById('clock').classList.add('running');
  document.getElementById('clock-sub').innerHTML='<span class="running-dot"></span>Časovač běží…';
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=true;
  timerInterval=setInterval(()=>{
    timerSecs++;
    document.getElementById('clock').textContent=fmtSecs(timerSecs);
  },1000);
}

async function stopTimer() {
  clearInterval(timerInterval); timerRunning=false;
  await api.remove('member','private',`tt-running-${cardId}`);
  const mins=Math.max(1,Math.round(timerSecs/60));
  await saveLog({mins,desc:''});
  document.getElementById('clock').classList.remove('running');
  document.getElementById('btn-stop').classList.add('hidden');
  document.getElementById('btn-start').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=false;
  document.getElementById('clock-sub').textContent=`Zalogováno ${fmtHM(mins)}`;
  timerSecs=0;
  document.getElementById('clock').textContent='00:00:00';
  toast(`✓ Zalogováno ${fmtHM(mins)}`);
  await renderLog();
}

function resetTimer() {
  timerSecs=0;
  document.getElementById('clock').textContent='00:00:00';
  document.getElementById('clock-sub').textContent='Připraven ke spuštění';
  document.getElementById('btn-reset').disabled=true;
}

// ═══════════════════════════════════════════════════════
// MANUÁLNÍ ZADÁNÍ
// ═══════════════════════════════════════════════════════
async function addManual() {
  const h=parseInt(document.getElementById('mh').value)||0;
  const m=parseInt(document.getElementById('mm').value)||0;
  const mins=h*60+m;
  if(mins<=0){toast('Zadej platný čas');return;}
  const desc=document.getElementById('mdesc').value.trim();
  await saveLog({mins,desc});
  document.getElementById('mh').value='';
  document.getElementById('mm').value='';
  document.getElementById('mdesc').value='';
  toast(`✓ Přidáno ${fmtHM(mins)}`);
  await renderLog();
}

// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
async function saveLog({mins,desc}) {
  const logs=await api.get('board','shared','tt-logs')||[];
  logs.push({
    id:genId(),
    memberId:currentMember.id,
    memberName:currentMember.fullName,
    cardId,
    cardName:cardNameStr,
    cardLabels,            // ← štítky uloženy do záznamu
    mins, desc,
    date:new Date().toISOString().slice(0,10),
  });
  await api.set('board','shared','tt-logs',logs);
  const cardMins=logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0);
  await api.set('card','shared','tt-total',cardMins);
}

async function deleteLog(logId) {
  const logs=(await api.get('board','shared','tt-logs')||[]).filter(l=>l.id!==logId);
  await api.set('board','shared','tt-logs',logs);
  const cardMins=logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0);
  await api.set('card','shared','tt-total',cardMins);
  await renderLog();
}

// ═══════════════════════════════════════════════════════
// RENDER LOGU
// ═══════════════════════════════════════════════════════
async function renderLog() {
  const allLogs=await api.get('board','shared','tt-logs')||[];
  const logs=allLogs.filter(l=>l.cardId===cardId);
  const visible=isAdmin?logs:logs.filter(l=>l.memberId===currentMember.id);
  const el=document.getElementById('log-scroll');
  const totalMins=visible.reduce((s,l)=>s+l.mins,0);

  document.getElementById('log-total').textContent=totalMins>0?fmtHM(totalMins):'—';
  document.getElementById('log-count').textContent=visible.length>0?`${visible.length} záznamů`:'';

  if(!visible.length){
    el.innerHTML='<div class="empty">Žádné záznamy pro tuto kartu</div>';
    api.resize(); return;
  }

  el.innerHTML=[...visible].reverse().map(l=>{
    const color=memberColor(l.memberId);
    const ini=initials(l.memberName);
    const canDel=isAdmin||l.memberId===currentMember?.id;
    return `<div class="log-entry">
      <div class="avatar" style="background:${color}">${ini}</div>
      <div class="log-info">
        <div class="log-desc">${l.desc||'—'}</div>
        <div class="log-meta">${l.memberName} · ${l.date}</div>
      </div>
      <div class="log-time">${fmtHM(l.mins)}</div>
      ${canDel?`<button class="log-del" onclick="deleteLog('${l.id}')" title="Smazat">×</button>`:''}
    </div>`;
  }).join('');

  // Resize po renderu — iframe se přizpůsobí obsahu
  api.resize();
}

init();
</script>
</body>
</html>
