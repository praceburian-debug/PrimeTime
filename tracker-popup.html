<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>PrimeTime</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0D0D0F;--s:#16161A;--s2:#1E1E24;--s3:#26262E;
    --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.15);
    --txt:#F0EFE8;--m:#7A7A88;
    --ac:#6C5CE7;--ac2:#A29BFE;--gr:#00B894;
    --rb:rgba(214,48,49,0.14);--rt:#FF7675;--rbr:rgba(214,48,49,0.22);
    --f:'Inter',sans-serif;--fm:'DM Mono',monospace;
  }

  /*
    Trello popup max šířka ~300px.
    Nastavíme přesně 300px — t.sizeTo() řídí výšku dynamicky.
    Všechny prvky musí pohodlně sedět do této šířky.
  */
  html{background:var(--bg);}
  body{font-family:var(--f);background:var(--bg);color:var(--txt);width:300px;}

  /* Preview banner */
  #pb{display:none;background:rgba(108,92,231,.12);border-bottom:1px solid rgba(108,92,231,.2);padding:5px 12px;font-size:11px;color:var(--ac2);}
  #pb.on{display:block;}

  /* Karta */
  .ca{padding:12px 12px 0;}
  .cc{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:6px 10px;}
  .cd{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;}
  .cn{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .lr{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
  .lp{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;color:white;text-transform:uppercase;letter-spacing:.04em;}

  /* Hodiny */
  .cla{text-align:center;padding:14px 12px 10px;border-top:1px solid var(--b);border-bottom:1px solid var(--b);margin-top:12px;background:linear-gradient(135deg,rgba(108,92,231,.05),transparent 60%);}
  #clock{font-family:var(--fm);font-size:42px;font-weight:500;letter-spacing:-2px;line-height:1;color:var(--txt);transition:color .3s;}
  #clock.r{color:var(--ac2);}
  #csub{font-size:11px;color:var(--m);margin-top:6px;font-family:var(--fm);min-height:16px;}

  /* Controls — Spustit zabere plnou šířku, Reset vedle */
  .ctr{display:grid;grid-template-columns:1fr auto;gap:7px;padding:10px 12px;}
  .btn{padding:10px 8px;border-radius:8px;border:none;font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
  .bs{background:var(--ac);color:white;}
  .bs:hover{background:#7C6AF0;transform:translateY(-1px);}
  .bst{background:var(--rb);color:var(--rt);border:1px solid var(--rbr);}
  .bst:hover{background:rgba(214,48,49,.24);}
  /* Reset — kompaktní, jen ikona + text */
  .br{background:var(--s2);color:var(--m);border:1px solid var(--b);padding:10px 10px;font-size:12px;}
  .br:hover{background:var(--s3);color:var(--txt);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
  .h{display:none!important;}

  /* ── Manuální zadání — 2 řádky ─────────────────────────
     Řádek 1: [hh] : [mm]   (čas)
     Řádek 2: [popis  ] [+Přidat]
     Každý řádek se pohodlně vejde do 300px.
  ─────────────────────────────────────────────────────── */
  .man{padding:0 12px 10px;border-bottom:1px solid var(--b);}
  .sl{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:7px;}

  /* Řádek 1: hh : mm */
  .mr1{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
  .ti{font-family:var(--fm);font-size:15px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:8px 4px;color:var(--txt);width:62px;text-align:center;outline:none;-moz-appearance:textfield;}
  .ti::-webkit-inner-spin-button,.ti::-webkit-outer-spin-button{-webkit-appearance:none;}
  .ti:focus{border-color:var(--ac);}
  .sep{color:var(--m);font-family:var(--fm);font-size:18px;}
  /* Rozšiřující label "hodin / minut" */
  .tu{font-size:11px;color:var(--m);margin-left:2px;}

  /* Řádek 2: popis + tlačítko */
  .mr2{display:flex;gap:6px;align-items:center;}
  .di{font-family:var(--f);font-size:12px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:8px 9px;color:var(--txt);outline:none;flex:1;min-width:0;}
  .di:focus{border-color:var(--ac);}
  .di::placeholder{color:var(--m);}
  .badd{padding:8px 11px;background:var(--ac);color:white;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);transition:background .15s;white-space:nowrap;flex-shrink:0;}
  .badd:hover{background:#7C6AF0;}

  /* Log */
  .lh{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 6px;}
  .lc{font-size:11px;color:var(--m);}
  #ls{max-height:200px;overflow-y:auto;padding:0 12px;}
  #ls::-webkit-scrollbar{width:3px;}
  #ls::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}

  .le{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b);font-size:12px;}
  .le:last-child{border-bottom:none;}
  .av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:white;flex-shrink:0;}
  .li{flex:1;min-width:0;}
  .ld{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lm{font-size:10px;color:var(--m);margin-top:2px;}
  .lt{font-family:var(--fm);font-size:11px;color:var(--ac2);flex-shrink:0;font-weight:500;}
  .ldel{background:none;border:none;color:var(--m);cursor:pointer;font-size:14px;padding:1px 4px;border-radius:3px;line-height:1;flex-shrink:0;transition:all .1s;}
  .ldel:hover{background:var(--rb);color:var(--rt);}

  /* Footer */
  #lf{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 12px;border-top:1px solid var(--b);}
  .tl{font-size:11px;color:var(--m);font-weight:500;}
  .tv{font-family:var(--fm);font-size:13px;color:var(--ac2);font-weight:500;}

  .empty{font-size:12px;color:var(--m);text-align:center;padding:14px 0;}

  /* Toast */
  #toast{position:fixed;bottom:10px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:99;}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

  .rdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gr);margin-right:5px;vertical-align:middle;animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div id="pb">Preview – mimo Trello. Data jsou ukázková.</div>

<!-- Karta -->
<div class="ca">
  <div class="cc">
    <div class="cd"></div>
    <div class="cn" id="cname">Načítám…</div>
  </div>
  <div class="lr" id="lbls"></div>
</div>

<!-- Hodiny -->
<div class="cla">
  <div id="clock">00:00:00</div>
  <div id="csub">Připraven ke spuštění</div>
</div>

<!-- Ovládání -->
<div class="ctr">
  <button class="btn bs" id="btn-s" onclick="startTimer()">▶ Spustit</button>
  <button class="btn bst h" id="btn-stop" onclick="stopTimer()">■ Stop</button>
  <button class="btn br" id="btn-r" onclick="resetTimer()" disabled>↺</button>
</div>

<!-- Manuální zadání — 2 řádky -->
<div class="man">
  <div class="sl">Přidat čas manuálně</div>

  <!-- Řádek 1: čas -->
  <div class="mr1">
    <input type="number" class="ti" id="mh" placeholder="hh" min="0" max="99">
    <span class="sep">:</span>
    <input type="number" class="ti" id="mm" placeholder="mm" min="0" max="59">
    <span class="tu">h&nbsp;&nbsp;&nbsp;&nbsp;min</span>
  </div>

  <!-- Řádek 2: popis + tlačítko -->
  <div class="mr2">
    <input type="text" class="di" id="md" placeholder="Popis práce…">
    <button class="badd" onclick="addManual()">+ Přidat</button>
  </div>
</div>

<!-- Log -->
<div class="lh">
  <div class="sl" style="margin-bottom:0">Záznamy</div>
  <span class="lc" id="lcnt"></span>
</div>
<div id="ls"><div class="empty">Načítám…</div></div>

<!-- Footer -->
<div id="lf">
  <span class="tl">Celkem</span>
  <span class="tv" id="ltot">—</span>
</div>

<div id="toast"></div>

<script>
const IN_TRELLO=(()=>{try{return window.self!==window.top&&typeof TrelloPowerUp!=='undefined';}catch(e){return false;}})();

const LH={green:'#61BD4F',yellow:'#F2D600',orange:'#FF9F1A',red:'#EB5A46',purple:'#C377E0',blue:'#0079BF',sky:'#00C2E0',lime:'#51E898',pink:'#FF78CB',black:'#344563',green_dark:'#519839',yellow_dark:'#D9B51C',orange_dark:'#D79B00',red_dark:'#B04632',purple_dark:'#89609E',blue_dark:'#055A8C',sky_dark:'#0098C7',lime_dark:'#4BBF6B',pink_dark:'#C9558F',black_dark:'#091E42',green_light:'#B7DDB0',yellow_light:'#F5EA92',orange_light:'#FAD29C',red_light:'#EFB3AB',purple_light:'#DFC0EB',blue_light:'#9AD0ED',sky_light:'#76D6ED',lime_light:'#B3F1D0',pink_light:'#F9C2E4',black_light:'#B6BFCE'};
function lh(c){return LH[c]||'#888';}

// Mock
const MC={id:'c1',name:'Teambuilding (preview)',labels:[{name:'Socials',color:'blue'},{name:'Q2',color:'green'}]};
const MM={id:'m1',fullName:'Jakub Novák'};
let ML=[
  {id:'l1',memberId:'m1',memberName:'Jakub Novák',cardId:'c1',cardName:'Teambuilding',cardLabels:[{name:'Socials',color:'blue'}],mins:90,desc:'Příprava programu',date:'2026-03-26'},
  {id:'l2',memberId:'m2',memberName:'Tereza Dvořák',cardId:'c1',cardName:'Teambuilding',cardLabels:[{name:'Socials',color:'blue'}],mins:120,desc:'Booking ubytování',date:'2026-03-27'},
  {id:'l3',memberId:'m1',memberName:'Jakub Novák',cardId:'c1',cardName:'Teambuilding',cardLabels:[{name:'Socials',color:'blue'}],mins:45,desc:'Email koordinace',date:'2026-03-27'},
];

let _t=null;if(IN_TRELLO)_t=TrelloPowerUp.iframe();
const api={
  card:(...f)=>IN_TRELLO?_t.card(...f):Promise.resolve(MC),
  member:(...f)=>IN_TRELLO?_t.member(...f):Promise.resolve(MM),
  get:(s,v,k)=>{if(IN_TRELLO)return _t.get(s,v,k);if(k==='tt-logs')return Promise.resolve(ML);if(k==='tt-permissions')return Promise.resolve({admins:[],trackers:['m1']});return Promise.resolve(null);},
  set:(s,v,k,val)=>{if(IN_TRELLO)return _t.set(s,v,k,val);if(k==='tt-logs')ML=val;return Promise.resolve();},
  remove:(s,v,k)=>IN_TRELLO?_t.remove(s,v,k):Promise.resolve(),
  resize:()=>{if(IN_TRELLO)_t.sizeTo(document.body).catch(()=>{});},
};

const COLS=['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function mc(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffffffff;return COLS[Math.abs(h)%COLS.length];}
function ini(n){const p=(n||'?').trim().split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}
function fmtS(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');}
function fmtHM(m){const h=Math.floor(m/60),mm=m%60;return h>0?h+'h '+mm+'m':mm+'m';}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2400);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

let cardId=null,cardName='',cardLabels=[],member=null,isAdmin=false;
let tsecs=0,tint=null,trun=false;

async function init(){
  if(!IN_TRELLO)document.getElementById('pb').classList.add('on');
  try{
    const[card,mbr,perms]=await Promise.all([
      api.card('id','name','labels'),
      api.member('id','fullName'),
      api.get('board','shared','tt-permissions'),
    ]);
    cardId=card.id; cardName=card.name; cardLabels=card.labels||[];
    member=mbr;
    document.getElementById('cname').textContent=card.name;
    const lr=document.getElementById('lbls');
    if(cardLabels.length){lr.innerHTML=cardLabels.map(l=>'<span class="lp" style="background:'+lh(l.color)+'">'+(l.name||'')+'</span>').join('');}
    else{lr.style.display='none';}
    const aids=perms?.admins||[];
    isAdmin=aids.length===0||aids.includes(mbr.id);
    const run=await api.get('member','private','tt-running-'+cardId);
    if(run?.startedAt){tsecs=Math.floor((Date.now()-run.startedAt)/1000);resumeTimer();}
    await renderLog();
    api.resize();
  }catch(e){
    document.getElementById('ls').innerHTML='<div class="empty" style="color:#FF7675">Chyba: '+e.message+'</div>';
    api.resize();
  }
}

async function startTimer(){
  trun=true;
  await api.set('member','private','tt-running-'+cardId,{startedAt:Date.now()-tsecs*1000});
  tint=setInterval(()=>{tsecs++;document.getElementById('clock').textContent=fmtS(tsecs);},1000);
  document.getElementById('clock').classList.add('r');
  document.getElementById('csub').innerHTML='<span class="rdot"></span>Časovač běží…';
  document.getElementById('btn-s').classList.add('h');
  document.getElementById('btn-stop').classList.remove('h');
  document.getElementById('btn-r').disabled=true;
}
function resumeTimer(){
  trun=true;
  document.getElementById('clock').textContent=fmtS(tsecs);
  document.getElementById('clock').classList.add('r');
  document.getElementById('csub').innerHTML='<span class="rdot"></span>Časovač běží…';
  document.getElementById('btn-s').classList.add('h');
  document.getElementById('btn-stop').classList.remove('h');
  document.getElementById('btn-r').disabled=true;
  tint=setInterval(()=>{tsecs++;document.getElementById('clock').textContent=fmtS(tsecs);},1000);
}
async function stopTimer(){
  clearInterval(tint);trun=false;
  await api.remove('member','private','tt-running-'+cardId);
  const mins=Math.max(1,Math.round(tsecs/60));
  await saveLog({mins,desc:''});
  document.getElementById('clock').classList.remove('r');
  document.getElementById('btn-stop').classList.add('h');
  document.getElementById('btn-s').classList.remove('h');
  document.getElementById('btn-r').disabled=false;
  document.getElementById('csub').textContent='Zalogováno '+fmtHM(mins);
  tsecs=0; document.getElementById('clock').textContent='00:00:00';
  toast('✓ Zalogováno '+fmtHM(mins));
  await renderLog(); api.resize();
}
function resetTimer(){tsecs=0;document.getElementById('clock').textContent='00:00:00';document.getElementById('csub').textContent='Připraven ke spuštění';document.getElementById('btn-r').disabled=true;}

async function addManual(){
  const h=parseInt(document.getElementById('mh').value)||0;
  const m=parseInt(document.getElementById('mm').value)||0;
  const mins=h*60+m;
  if(mins<=0){toast('Zadej platný čas');return;}
  const desc=document.getElementById('md').value.trim();
  await saveLog({mins,desc});
  document.getElementById('mh').value=''; document.getElementById('mm').value=''; document.getElementById('md').value='';
  toast('✓ Přidáno '+fmtHM(mins));
  await renderLog(); api.resize();
}

async function saveLog({mins,desc}){
  const logs=await api.get('board','shared','tt-logs')||[];
  logs.push({id:genId(),memberId:member.id,memberName:member.fullName,cardId,cardName,cardLabels,mins,desc,date:new Date().toISOString().slice(0,10)});
  await api.set('board','shared','tt-logs',logs);
  await api.set('card','shared','tt-total',logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0));
}
async function deleteLog(id){
  const logs=(await api.get('board','shared','tt-logs')||[]).filter(l=>l.id!==id);
  await api.set('board','shared','tt-logs',logs);
  await api.set('card','shared','tt-total',logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0));
  await renderLog(); api.resize();
}

async function renderLog(){
  const all=await api.get('board','shared','tt-logs')||[];
  const logs=all.filter(l=>l.cardId===cardId);
  const vis=isAdmin?logs:logs.filter(l=>l.memberId===member.id);
  const el=document.getElementById('ls');
  const tot=vis.reduce((s,l)=>s+l.mins,0);
  document.getElementById('ltot').textContent=tot>0?fmtHM(tot):'—';
  document.getElementById('lcnt').textContent=vis.length>0?vis.length+' záznamů':'';
  if(!vis.length){el.innerHTML='<div class="empty">Žádné záznamy</div>';return;}
  el.innerHTML=[...vis].reverse().map(l=>{
    const c=mc(l.memberId),canDel=isAdmin||l.memberId===member?.id;
    return'<div class="le"><div class="av" style="background:'+c+'">'+ini(l.memberName)+'</div><div class="li"><div class="ld">'+(l.desc||'—')+'</div><div class="lm">'+l.memberName+' · '+l.date+'</div></div><div class="lt">'+fmtHM(l.mins)+'</div>'+(canDel?'<button class="ldel" onclick="deleteLog(\''+l.id+'\')" title="Smazat">×</button>':'')+'</div>';
  }).join('');
}

init();
</script>
</body>
</html>
