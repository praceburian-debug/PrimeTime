<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>TimeTrack</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0D0D0F;--surf:#16161A;--s2:#1E1E24;--s3:#26262E;
    --bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.15);
    --text:#F0EFE8;--muted:#7A7A88;
    --accent:#6C5CE7;--accent2:#A29BFE;
    --green:#00B894;
    --red-bg:rgba(214,48,49,0.14);--red-txt:#FF7675;--red-bdr:rgba(214,48,49,0.22);
    --fb:'Inter',sans-serif;--fm:'DM Mono',monospace;
  }

  /* Fullscreen průhledný overlay — klik na bg NIC nedělá */
  html,body{
    width:100%;height:100%;
    background:rgba(0,0,0,0.45);
    font-family:var(--fb);color:var(--text);
    overflow:hidden;
    /* stop propagation není potřeba — Trello modal neřeší klik na bg */
  }

  /* Floating okno — centrované, fixní šířka 480px */
  #win{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:480px;
    background:var(--surf);
    border:1px solid var(--bdr2);
    border-radius:14px;
    box-shadow:0 32px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04);
    display:flex;flex-direction:column;
    max-height:90vh;
    overflow:hidden;
    /* Pozice a velikost se načte z localStorage */
  }

  /* Titlebar = drag handle */
  #titlebar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;height:44px;
    background:var(--s2);border-bottom:1px solid var(--bdr);
    cursor:grab;flex-shrink:0;
    border-radius:14px 14px 0 0;
  }
  #titlebar:active{cursor:grabbing;}
  .tl{display:flex;align-items:center;gap:8px;}
  .tl-logo{width:20px;height:20px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .tl-text{font-size:13px;font-weight:600;letter-spacing:-0.2px;}
  .tr{display:flex;align-items:center;gap:6px;}
  .win-btn{width:28px;height:28px;border-radius:7px;border:none;background:var(--s3);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .win-btn:hover{background:var(--bdr2);color:var(--text);}
  .win-btn.close:hover{background:var(--red-bg);color:var(--red-txt);}

  /* Running pill */
  .rpill{display:none;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--green);background:rgba(0,184,148,0.12);border:1px solid rgba(0,184,148,0.2);border-radius:6px;padding:2px 8px;font-family:var(--fm);}
  .rpill.on{display:flex;}
  .rdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* Resize handle */
  #rh{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:se-resize;opacity:.3;transition:opacity .2s;}
  #rh:hover{opacity:.7;}
  #rh::before,#rh::after{content:'';position:absolute;background:var(--muted);border-radius:2px;}
  #rh::before{width:10px;height:1.5px;bottom:7px;right:3px;transform:rotate(-45deg);}
  #rh::after{width:6px;height:1.5px;bottom:4px;right:3px;transform:rotate(-45deg);}

  /* Scrollovatelný obsah okna */
  #body{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
  #body::-webkit-scrollbar{width:4px;}
  #body::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px;}

  /* Preview banner */
  #pbanner{display:none;background:rgba(108,92,231,0.12);border-bottom:1px solid rgba(108,92,231,0.2);padding:5px 16px;font-size:11px;color:var(--accent2);flex-shrink:0;}
  #pbanner.on{display:block;}

  /* Karta chip */
  .card-area{padding:14px 16px 0;}
  .card-chip{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;padding:7px 12px;}
  .chip-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .chip-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .labels-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .lbl{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;color:white;text-transform:uppercase;letter-spacing:.04em;}

  /* Hodiny */
  .clock-area{text-align:center;padding:18px 16px 14px;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);margin-top:14px;background:linear-gradient(135deg,rgba(108,92,231,.05) 0%,transparent 60%);}
  #clock{font-family:var(--fm);font-size:54px;font-weight:500;letter-spacing:-3px;line-height:1;color:var(--text);transition:color .3s;}
  #clock.running{color:var(--accent2);}
  #clock-sub{font-size:12px;color:var(--muted);margin-top:8px;font-family:var(--fm);min-height:18px;}

  /* Controls */
  .controls{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;padding:14px 16px;}
  .btn{padding:11px 10px;border-radius:9px;border:none;font-family:var(--fb);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;}
  .btn-start{background:var(--accent);color:white;}
  .btn-start:hover{background:#7C6AF0;transform:translateY(-1px);}
  .btn-stop{background:var(--red-bg);color:var(--red-txt);border:1px solid var(--red-bdr);}
  .btn-stop:hover{background:rgba(214,48,49,.24);}
  .btn-reset{background:var(--s2);color:var(--muted);border:1px solid var(--bdr);padding:11px 16px;}
  .btn-reset:hover{background:var(--s3);color:var(--text);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
  .hidden{display:none!important;}

  /* Manuální zadání */
  .manual{padding:0 16px 14px;border-bottom:1px solid var(--bdr);}
  .slabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:8px;}
  /* Grid: hh : mm [popis flex] [+ Přidat] */
  .manual-row{display:grid;grid-template-columns:54px 14px 54px 1fr auto;gap:6px;align-items:center;}
  .ti{font-family:var(--fm);font-size:15px;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;padding:9px 6px;color:var(--text);width:100%;text-align:center;outline:none;-moz-appearance:textfield;}
  .ti::-webkit-inner-spin-button,.ti::-webkit-outer-spin-button{-webkit-appearance:none;}
  .ti:focus{border-color:var(--accent);}
  .tsep{color:var(--muted);font-family:var(--fm);font-size:18px;text-align:center;}
  .di{font-family:var(--fb);font-size:13px;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;padding:9px 10px;color:var(--text);outline:none;width:100%;}
  .di:focus{border-color:var(--accent);}
  .di::placeholder{color:var(--muted);}
  .btn-add{padding:9px 14px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:background .15s;white-space:nowrap;}
  .btn-add:hover{background:#7C6AF0;}

  /* Log */
  .log-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;}
  .log-cnt{font-size:11px;color:var(--muted);}
  /* Log scroll — roste s obsahem, max 240px */
  #log-scroll{overflow-y:auto;padding:0 16px;}
  #log-scroll::-webkit-scrollbar{width:3px;}
  #log-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}
  .log-entry{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
  .log-entry:last-child{border-bottom:none;}
  .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0;}
  .li{flex:1;min-width:0;}
  .ld{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lm{font-size:11px;color:var(--muted);margin-top:2px;}
  .lt{font-family:var(--fm);font-size:12px;color:var(--accent2);flex-shrink:0;font-weight:500;}
  .ldel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:4px;line-height:1;flex-shrink:0;transition:all .1s;}
  .ldel:hover{background:var(--red-bg);color:var(--red-txt);}

  /* Footer */
  #log-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 14px;border-top:1px solid var(--bdr);flex-shrink:0;}
  .tot-lbl{font-size:12px;color:var(--muted);font-weight:500;}
  .tot-val{font-family:var(--fm);font-size:14px;color:var(--accent2);font-weight:500;}

  .empty{font-size:13px;color:var(--muted);text-align:center;padding:20px 0;}

  /* Toast */
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid var(--bdr2);border-radius:9px;padding:9px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999;}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="win">
  <div id="titlebar">
    <div class="tl">
      <div class="tl-logo">⏱</div>
      <span class="tl-text">TimeTrack</span>
      <div class="rpill" id="rpill"><span class="rdot"></span><span id="rpill-txt">0:00 běží</span></div>
    </div>
    <div class="tr">
      <button class="win-btn" onclick="resetPos()" title="Výchozí pozice">⊹</button>
      <button class="win-btn close" onclick="closeMe()" title="Zavřít">✕</button>
    </div>
  </div>

  <div id="body">
    <div id="pbanner">Preview – mimo Trello. Data jsou ukázková.</div>

    <div class="card-area">
      <div class="card-chip">
        <div class="chip-dot"></div>
        <div class="chip-name" id="card-name">Načítám…</div>
      </div>
      <div class="labels-row" id="labels-row"></div>
    </div>

    <div class="clock-area">
      <div id="clock">00:00:00</div>
      <div id="clock-sub">Připraven ke spuštění</div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btn-start" onclick="startTimer()">▶ Spustit</button>
      <button class="btn btn-stop hidden" id="btn-stop" onclick="stopTimer()">■ Zastavit</button>
      <button class="btn btn-reset" id="btn-reset" onclick="resetTimer()" disabled>↺ Reset</button>
    </div>

    <div class="manual">
      <div class="slabel">Přidat čas manuálně</div>
      <div class="manual-row">
        <input type="number" class="ti" id="mh" placeholder="hh" min="0" max="99">
        <span class="tsep">:</span>
        <input type="number" class="ti" id="mm" placeholder="mm" min="0" max="59">
        <input type="text" class="di" id="mdesc" placeholder="Co jsi dělal/a?">
        <button class="btn-add" onclick="addManual()">+ Přidat</button>
      </div>
    </div>

    <div class="log-hdr">
      <div class="slabel" style="margin-bottom:0">Záznamy na této kartě</div>
      <span class="log-cnt" id="log-cnt"></span>
    </div>
    <div id="log-scroll"><div class="empty">Načítám…</div></div>
  </div>

  <div id="log-footer">
    <span class="tot-lbl">Celkem</span>
    <span class="tot-val" id="log-total">—</span>
  </div>

  <div id="rh"></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// PROSTŘEDÍ
// ═══════════════════════════════════════════
const IN_TRELLO=(()=>{try{return window.self!==window.top&&typeof TrelloPowerUp!=='undefined';}catch(e){return false;}})();

const LABEL_HEX={green:'#61BD4F',yellow:'#F2D600',orange:'#FF9F1A',red:'#EB5A46',purple:'#C377E0',blue:'#0079BF',sky:'#00C2E0',lime:'#51E898',pink:'#FF78CB',black:'#344563',green_dark:'#519839',yellow_dark:'#D9B51C',orange_dark:'#D79B00',red_dark:'#B04632',purple_dark:'#89609E',blue_dark:'#055A8C',sky_dark:'#0098C7',lime_dark:'#4BBF6B',pink_dark:'#C9558F',black_dark:'#091E42',green_light:'#B7DDB0',yellow_light:'#F5EA92',orange_light:'#FAD29C',red_light:'#EFB3AB',purple_light:'#DFC0EB',blue_light:'#9AD0ED',sky_light:'#76D6ED',lime_light:'#B3F1D0',pink_light:'#F9C2E4',black_light:'#B6BFCE'};
function lhex(c){return LABEL_HEX[c]||'#888';}

// Mock
const MOCK_CARD={id:'c1',name:'Teambuilding (preview)',labels:[{name:'Socials',color:'blue'},{name:'Q2',color:'green'}]};
const MOCK_MEMBER={id:'m1',fullName:'Jakub Novák'};
const MOCK_PERMS={admins:[],trackers:['m1']};
let MOCK_LOGS=[
  {id:'l1',memberId:'m1',memberName:'Jakub Novák',cardId:'c1',cardName:'Teambuilding',cardLabels:[{name:'Socials',color:'blue'}],mins:90,desc:'Příprava programu',date:'2026-03-26'},
  {id:'l2',memberId:'m1',memberName:'Jakub Novák',cardId:'c1',cardName:'Teambuilding',cardLabels:[{name:'Socials',color:'blue'}],mins:45,desc:'Email koordinace',date:'2026-03-27'},
  {id:'l3',memberId:'m2',memberName:'Tereza Dvořák',cardId:'c1',cardName:'Teambuilding',cardLabels:[{name:'Socials',color:'blue'}],mins:120,desc:'Booking ubytování',date:'2026-03-27'},
];

let _t=null;if(IN_TRELLO)_t=TrelloPowerUp.iframe();
const api={
  card:(...f)=>IN_TRELLO?_t.card(...f):Promise.resolve(MOCK_CARD),
  member:(...f)=>IN_TRELLO?_t.member(...f):Promise.resolve(MOCK_MEMBER),
  get:(s,v,k)=>{if(IN_TRELLO)return _t.get(s,v,k);if(k==='tt-logs')return Promise.resolve(MOCK_LOGS);if(k==='tt-permissions')return Promise.resolve(MOCK_PERMS);return Promise.resolve(null);},
  set:(s,v,k,val)=>{if(IN_TRELLO)return _t.set(s,v,k,val);if(k==='tt-logs')MOCK_LOGS=val;return Promise.resolve();},
  remove:(s,v,k)=>IN_TRELLO?_t.remove(s,v,k):Promise.resolve(),
  close:()=>{if(IN_TRELLO)_t.closeModal();},
};

// ═══════════════════════════════════════════
// DRAG & RESIZE + PERSIST
// ═══════════════════════════════════════════
const WIN_KEY='tt-win2';
const win=document.getElementById('win');

function loadPos(){
  try{
    const s=JSON.parse(localStorage.getItem(WIN_KEY));
    if(!s)return;
    const mw=window.innerWidth,mh=window.innerHeight;
    win.style.transform='none';
    win.style.width=Math.min(s.w,mw-40)+'px';
    win.style.left=Math.max(0,Math.min(s.x,mw-200))+'px';
    win.style.top=Math.max(0,Math.min(s.y,mh-100))+'px';
  }catch(e){}
}
function savePos(){
  const r=win.getBoundingClientRect();
  localStorage.setItem(WIN_KEY,JSON.stringify({x:r.left,y:r.top,w:r.width}));
}
function resetPos(){
  localStorage.removeItem(WIN_KEY);
  win.style.width='480px';
  win.style.left='50%';
  win.style.top='50%';
  win.style.transform='translate(-50%,-50%)';
}
function ensureAbsolute(){
  if(win.style.transform!=='none'){
    const r=win.getBoundingClientRect();
    win.style.left=r.left+'px';
    win.style.top=r.top+'px';
    win.style.transform='none';
  }
}

// Drag
let drag=false,dox=0,doy=0;
document.getElementById('titlebar').addEventListener('mousedown',e=>{
  if(e.target.closest('.win-btn'))return;
  drag=true;ensureAbsolute();
  const r=win.getBoundingClientRect();
  dox=e.clientX-r.left;doy=e.clientY-r.top;
  document.body.style.cursor='grabbing';
});
document.addEventListener('mousemove',e=>{
  if(!drag)return;
  win.style.left=Math.max(0,Math.min(e.clientX-dox,window.innerWidth-win.offsetWidth))+'px';
  win.style.top=Math.max(0,Math.min(e.clientY-doy,window.innerHeight-60))+'px';
});
document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;document.body.style.cursor='';savePos();});

// Resize
const rh=document.getElementById('rh');
let rsz=false,rox=0,rw0=0;
rh.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();rsz=true;ensureAbsolute();rox=e.clientX;rw0=win.offsetWidth;document.body.style.cursor='se-resize';});
document.addEventListener('mousemove',e=>{if(!rsz)return;win.style.width=Math.max(380,rw0+e.clientX-rox)+'px';});
document.addEventListener('mouseup',()=>{if(!rsz)return;rsz=false;document.body.style.cursor='';savePos();});

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const COLORS=['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function mc(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function inits(n){const p=(n||'?').trim().split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}
function fmtS(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');}
function fmtHM(m){const h=Math.floor(m/60),mm=m%60;return h>0?h+'h '+mm+'m':mm+'m';}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2400);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function closeMe(){api.close();}

// ═══════════════════════════════════════════
// STAV
// ═══════════════════════════════════════════
let cardId=null,cardNameStr='',cardLabels=[],currentMember=null,isAdmin=false;
let timerSecs=0,timerInterval=null,timerRunning=false;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init(){
  loadPos();
  if(!IN_TRELLO)document.getElementById('pbanner').classList.add('on');
  try{
    const[card,member,perms]=await Promise.all([
      api.card('id','name','labels'),
      api.member('id','fullName'),
      api.get('board','shared','tt-permissions'),
    ]);
    cardId=card.id;cardNameStr=card.name;cardLabels=card.labels||[];
    currentMember=member;
    document.getElementById('card-name').textContent=card.name;
    renderCardLabels(cardLabels);
    const adminIds=perms?.admins||[];
    isAdmin=adminIds.length===0||adminIds.includes(member.id);
    const running=await api.get('member','private','tt-running-'+cardId);
    if(running?.startedAt){timerSecs=Math.floor((Date.now()-running.startedAt)/1000);resumeTimer();}
    await renderLog();
  }catch(err){
    document.getElementById('log-scroll').innerHTML='<div class="empty" style="color:#FF7675">Chyba: '+err.message+'</div>';
  }
}

function renderCardLabels(labels){
  const row=document.getElementById('labels-row');
  if(!labels||!labels.length){row.style.display='none';return;}
  row.innerHTML=labels.map(l=>'<span class="lbl" style="background:'+lhex(l.color)+'">'+( l.name||'&nbsp;&nbsp;')+'</span>').join('');
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function updatePill(){
  const h=Math.floor(timerSecs/3600),m=Math.floor((timerSecs%3600)/60),s=timerSecs%60;
  document.getElementById('rpill-txt').textContent=h>0?h+':'+String(m).padStart(2,'0')+' běží':m+':'+String(s).padStart(2,'0')+' běží';
}
async function startTimer(){
  timerRunning=true;
  const startedAt=Date.now()-timerSecs*1000;
  await api.set('member','private','tt-running-'+cardId,{startedAt});
  timerInterval=setInterval(()=>{timerSecs++;document.getElementById('clock').textContent=fmtS(timerSecs);updatePill();},1000);
  document.getElementById('clock').classList.add('running');
  document.getElementById('clock-sub').innerHTML='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 1.4s infinite;vertical-align:middle"></span>Časovač běží…';
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=true;
  document.getElementById('rpill').classList.add('on');
  updatePill();
}
function resumeTimer(){
  timerRunning=true;
  document.getElementById('clock').textContent=fmtS(timerSecs);
  document.getElementById('clock').classList.add('running');
  document.getElementById('clock-sub').innerHTML='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 1.4s infinite;vertical-align:middle"></span>Časovač běží…';
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=true;
  document.getElementById('rpill').classList.add('on');
  updatePill();
  timerInterval=setInterval(()=>{timerSecs++;document.getElementById('clock').textContent=fmtS(timerSecs);updatePill();},1000);
}
async function stopTimer(){
  clearInterval(timerInterval);timerRunning=false;
  await api.remove('member','private','tt-running-'+cardId);
  const mins=Math.max(1,Math.round(timerSecs/60));
  await saveLog({mins,desc:''});
  document.getElementById('clock').classList.remove('running');
  document.getElementById('btn-stop').classList.add('hidden');
  document.getElementById('btn-start').classList.remove('hidden');
  document.getElementById('btn-reset').disabled=false;
  document.getElementById('clock-sub').textContent='Zalogováno '+fmtHM(mins);
  document.getElementById('rpill').classList.remove('on');
  timerSecs=0;document.getElementById('clock').textContent='00:00:00';
  toast('✓ Zalogováno '+fmtHM(mins));
  await renderLog();
}
function resetTimer(){timerSecs=0;document.getElementById('clock').textContent='00:00:00';document.getElementById('clock-sub').textContent='Připraven ke spuštění';document.getElementById('btn-reset').disabled=true;}

// ═══════════════════════════════════════════
// MANUÁLNÍ
// ═══════════════════════════════════════════
async function addManual(){
  const h=parseInt(document.getElementById('mh').value)||0;
  const m=parseInt(document.getElementById('mm').value)||0;
  const mins=h*60+m;
  if(mins<=0){toast('Zadej platný čas');return;}
  const desc=document.getElementById('mdesc').value.trim();
  await saveLog({mins,desc});
  document.getElementById('mh').value='';document.getElementById('mm').value='';document.getElementById('mdesc').value='';
  toast('✓ Přidáno '+fmtHM(mins));
  await renderLog();
}

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
async function saveLog({mins,desc}){
  const logs=await api.get('board','shared','tt-logs')||[];
  logs.push({id:genId(),memberId:currentMember.id,memberName:currentMember.fullName,cardId,cardName:cardNameStr,cardLabels,mins,desc,date:new Date().toISOString().slice(0,10)});
  await api.set('board','shared','tt-logs',logs);
  const cm=logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0);
  await api.set('card','shared','tt-total',cm);
}
async function deleteLog(id){
  const logs=(await api.get('board','shared','tt-logs')||[]).filter(l=>l.id!==id);
  await api.set('board','shared','tt-logs',logs);
  const cm=logs.filter(l=>l.cardId===cardId).reduce((s,l)=>s+l.mins,0);
  await api.set('card','shared','tt-total',cm);
  await renderLog();
}

// ═══════════════════════════════════════════
// RENDER LOGU
// ═══════════════════════════════════════════
async function renderLog(){
  const all=await api.get('board','shared','tt-logs')||[];
  const logs=all.filter(l=>l.cardId===cardId);
  const visible=isAdmin?logs:logs.filter(l=>l.memberId===currentMember.id);
  const el=document.getElementById('log-scroll');
  const tot=visible.reduce((s,l)=>s+l.mins,0);
  document.getElementById('log-total').textContent=tot>0?fmtHM(tot):'—';
  document.getElementById('log-cnt').textContent=visible.length>0?visible.length+' záznamů':'';
  if(!visible.length){el.innerHTML='<div class="empty">Žádné záznamy pro tuto kartu</div>';return;}
  el.innerHTML=[...visible].reverse().map(l=>{
    const color=mc(l.memberId),ini=inits(l.memberName),canDel=isAdmin||l.memberId===currentMember?.id;
    return'<div class="log-entry"><div class="av" style="background:'+color+'">'+ini+'</div><div class="li"><div class="ld">'+(l.desc||'—')+'</div><div class="lm">'+l.memberName+' · '+l.date+'</div></div><div class="lt">'+fmtHM(l.mins)+'</div>'+(canDel?'<button class="ldel" onclick="deleteLog(\''+l.id+'\')" title="Smazat">×</button>':'')+'</div>';
  }).join('');
}

init();
</script>
